[pytest]
# Run from the repo root: `pytest`. conftest.py imports the app as the absolute
# package `backend.app.*`, so the repo root must be the working directory.
testpaths = backend/tests

# The canonical "does it pass" command enforces the coverage gate below. Running a
# subset of tests? add `--no-cov` to skip the gate, e.g. `pytest backend/tests/routers/test_spells.py --no-cov`.
addopts =
    -q
    --strict-markers
    --strict-config
    --cov=backend/app
    --cov-report=term-missing
    --cov-fail-under=90

markers =
    integration: exercises endpoints against the full frozen data/seeds/*.json (read-only, slower)
