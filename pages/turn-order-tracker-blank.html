<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blank Turn Order Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #fdf3e3;
    --ink: #2c1810;
    --red: #c0392b;
    --blue: #2471a3;
    --green: #1e8449;
    --gold: #c9a90a;
    --purple: #7d3c98;
    --orange: #ca6f1e;
    --border: #8b5e3c;
    --wb: #fffef7;
    --wbl: #b0865a;
    --muted: #8b5e3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #c9a97a; font-family: 'Nunito', sans-serif; color: var(--ink); }

  .sheet {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    background: var(--parchment);
    padding: 8mm;
    position: relative;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 28pt;
    color: var(--red);
    text-align: center;
    margin-bottom: 12mm;
    text-shadow: 2px 2px 0 #f5cba7, 3px 3px 0 var(--border);
  }

  .turn-order-list {
    list-style: none;
  }

  .turn-item {
    background: var(--wb);
    border: 2px solid var(--wbl);
    border-radius: 6px;
    padding: 5mm;
    margin-bottom: 6mm;
    display: flex;
    align-items: center;
    gap: 5mm;
  }

  .turn-number {
    font-family: 'Fredoka One', cursive;
    font-size: 18pt;
    color: white;
    background: var(--red);
    width: 10mm;
    height: 10mm;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .turn-name {
    flex: 1;
    border-bottom: 2px solid var(--border);
    padding-bottom: 1mm;
    min-height: 8mm;
    font-size: 11pt;
  }

  @media print {
    body { background: none; }
    .sheet { margin: 0; }
  }
</style>
</head>
<body>
  <div class="sheet">
    <h1>⚔️ Turn Order ⚔️</h1>
    
    <ul class="turn-order-list">
      <li class="turn-item">
        <div class="turn-number">1</div>
        <div class="turn-name"></div>
      </li>
      <li class="turn-item">
        <div class="turn-number">2</div>
        <div class="turn-name"></div>
      </li>
      <li class="turn-item">
        <div class="turn-number">3</div>
        <div class="turn-name"></div>
      </li>
      <li class="turn-item">
        <div class="turn-number">4</div>
        <div class="turn-name"></div>
      </li>
      <li class="turn-item">
        <div class="turn-number">5</div>
        <div class="turn-name"></div>
      </li>
      <li class="turn-item">
        <div class="turn-number">6</div>
        <div class="turn-name"></div>
      </li>
      <li class="turn-item">
        <div class="turn-number">7</div>
        <div class="turn-name"></div>
      </li>
    </ul>
  </div>
</body>
</html>
