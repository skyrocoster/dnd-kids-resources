<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blank HP Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #fdf3e3;
    --ink: #2c1810;
    --red: #c0392b;
    --blue: #2471a3;
    --green: #1e8449;
    --gold: #c9a90a;
    --purple: #7d3c98;
    --orange: #ca6f1e;
    --border: #8b5e3c;
    --wb: #fffef7;
    --wbl: #b0865a;
    --muted: #8b5e3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #c9a97a; font-family: 'Nunito', sans-serif; color: var(--ink); }

  .sheet {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    background: var(--parchment);
    padding: 8mm;
    position: relative;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 28pt;
    color: var(--red);
    text-align: center;
    margin-bottom: 12mm;
    text-shadow: 2px 2px 0 #f5cba7, 3px 3px 0 var(--border);
  }

  .character-slot {
    background: var(--wb);
    border: 2px solid var(--wbl);
    border-radius: 8px;
    padding: 6mm;
    margin-bottom: 8mm;
  }

  .character-name {
    font-family: 'Fredoka One', cursive;
    font-size: 12pt;
    border-bottom: 2px solid var(--border);
    padding-bottom: 2mm;
    margin-bottom: 4mm;
    min-height: 8mm;
    color: var(--border);
  }

  .hp-circles {
    display: flex;
    flex-wrap: wrap;
    gap: 3mm;
  }

  .hp-circle {
    width: 6mm;
    height: 6mm;
    border: 2px solid var(--red);
    border-radius: 50%;
    cursor: pointer;
    background: white;
    transition: all 0.2s;
  }

  .hp-circle:hover {
    background: #ffebee;
  }

  .hp-circle.filled {
    background: var(--red);
  }

  @media print {
    body { background: none; }
    .sheet { margin: 0; }
  }
</style>
</head>
<body>
  <div class="sheet">
    <h1>❤️ HP Tracker ❤️</h1>
    
    <div class="character-slot">
      <div class="character-name">Character: _____________________</div>
      <div class="hp-circles">
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
      </div>
    </div>

    <div class="character-slot">
      <div class="character-name">Character: _____________________</div>
      <div class="hp-circles">
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
      </div>
    </div>

    <div class="character-slot">
      <div class="character-name">Character: _____________________</div>
      <div class="hp-circles">
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
      </div>
    </div>

    <div class="character-slot">
      <div class="character-name">Character: _____________________</div>
      <div class="hp-circles">
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
        <div class="hp-circle"></div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const circles = document.querySelectorAll('.hp-circle');
      circles.forEach((circle, index) => {
        circle.addEventListener('click', function(e) {
          e.preventDefault();
          this.classList.toggle('filled');
        });
      });
    });
  </script>
</body>
</html>
