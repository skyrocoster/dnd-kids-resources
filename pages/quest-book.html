<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quest Book — D&D Kids Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/page-layout.css">
  <style>
    .site-header {
      background: var(--md-sys-color-surface);
      padding: 2rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--md-sys-color-outline);
    }

    .site-header h1 {
      margin: 0 0 0.25rem 0;
      font-size: 2rem;
      color: var(--md-sys-color-on-surface);
    }

    .site-header p {
      margin: 0;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.95rem;
    }

    .quests-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .quests-controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .quests-controls input {
      flex: 1;
      min-width: 250px;
      padding: 0.75rem;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 8px;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-size: 0.95rem;
    }

    .quests-controls input::placeholder {
      color: var(--md-sys-color-on-surface-variant);
    }

    .quests-controls button {
      padding: 0.75rem 1.5rem;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .quests-controls button:hover {
      background: var(--md-sys-color-primary-dim);
    }

    #questCount {
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.9rem;
    }

    .quest-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .quest-card {
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      background: var(--md-sys-color-surface);
      transition: all 0.3s ease;
    }

    .quest-card:hover {
      border-color: var(--md-sys-color-primary);
      box-shadow: 0 4px 12px rgba(128, 203, 196, 0.25);
      transform: translateY(-2px);
    }

    .quest-card h3 {
      margin: 0 0 0.5rem 0;
      color: var(--md-sys-color-on-surface);
      font-size: 1.2rem;
    }

    .quest-card .quest-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .quest-card .meta-item {
      font-size: 0.85rem;
      color: var(--md-sys-color-on-surface-variant);
    }

    .quest-card p {
      margin: 0.5rem 0 0 0;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.9rem;
      line-height: 1.4;
      max-height: 4.5em;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .quest-card .card-footer {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--md-sys-color-outline);
      text-align: right;
    }

    .quest-card .view-btn {
      background: var(--md-sys-color-secondary);
      color: var(--md-sys-color-on-secondary);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }

    .quest-card .view-btn:hover {
      background: var(--md-sys-color-secondary-dim);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--md-sys-color-on-surface-variant);
    }

    .empty-state p {
      margin: 0;
      font-size: 1rem;
    }

  </style>
</head>
<body>
  <header class="site-header">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
      <div>
        <h1>📜 Quest Book</h1>
        <p>Create and manage quests</p>
      </div>
    </div>
  </header>

  <div class="quests-container">
    <div class="quests-controls">
      <input type="text" id="questSearch" placeholder="Search quests...">
      <button id="createQuestBtn">+ Create Quest</button>
      <span id="questCount">0 quests</span>
    </div>
    <div id="questList" class="quest-list">
      <div class="empty-state">
        <p>Type a quest name to begin searching...</p>
      </div>
    </div>
  </div>

  <div id="createQuestModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h2>Create New Quest</h2>
      <div class="modal-field">
        <label for="new-quest-name">Name</label>
        <input id="new-quest-name" type="text" placeholder="Quest name" required>
      </div>
      <div class="modal-field">
        <label for="new-quest-summary">Summary</label>
        <textarea id="new-quest-summary" placeholder="Short quest summary"></textarea>
      </div>
      <div class="modal-field">
        <label for="new-quest-location">Location</label>
        <input id="new-quest-location" type="text" placeholder="Village, Forest, Dungeon...">
      </div>
      <div class="modal-field">
        <label for="new-quest-dungeon">Related Dungeon</label>
        <select id="new-quest-dungeon">
          <option value="">Select a dungeon...</option>
        </select>
      </div>
      <div class="modal-field">
        <label for="new-quest-giver">Quest Giver</label>
        <select id="new-quest-giver">
          <option value="">Select an NPC...</option>
        </select>
      </div>
      <div class="modal-field">
        <label for="new-quest-reward">Reward (one item per line)</label>
        <textarea id="new-quest-reward" placeholder="e.g. 5 gp\na thank-you pie"></textarea>
      </div>
      <div class="modal-field">
        <label for="new-quest-objectives">Objectives (one per line)</label>
        <textarea id="new-quest-objectives" placeholder="Talk to the village elder\nSearch the orchard"></textarea>
      </div>
      <div class="modal-field">
        <label for="new-quest-details">Details (one per line)</label>
        <textarea id="new-quest-details" placeholder="The puppy is small and muddy."></textarea>
      </div>
      <div class="modal-field">
        <label for="new-quest-notes">Notes</label>
        <textarea id="new-quest-notes" placeholder="Optional behind-the-scenes notes"></textarea>
      </div>
      <div class="modal-buttons">
        <button type="button" class="cancel-btn" id="cancel-create-quest">Cancel</button>
        <button type="button" class="create-btn" id="submit-create-quest">Create Quest</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/dom-utils.js"></script>
  <script src="../js/data-utils.js"></script>
  <script src="../js/quest-book.js"></script>
</body>
</html>
