<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Stat Block Parser | Creatures Database</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .parser-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .parser-header {
            margin-bottom: 2rem;
        }

        .parser-header h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .parser-header p {
            color: #666;
            font-size: 1rem;
        }

        .parser-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .form-group textarea,
        .form-group input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }

        .form-group input[type="text"] {
            font-family: inherit;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-parse {
            background: #4CAF50;
            color: white;
            flex: 1;
        }

        .btn-parse:hover {
            background: #45a049;
        }

        .btn-parse:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f44336;
            color: white;
        }

        .btn-commit {
            background: #2196F3;
            color: white;
        }

        .btn-commit:hover {
            background: #1976D2;
        }

        .btn-commit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .action-buttons {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 4px;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.loading {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        @media (max-width: 768px) {
            .parser-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body style="background: #f5f5f5;">
    <div class="parser-container">
        <div class="parser-header">
            <h1>🗡️ D&D Content Parser</h1>
            <p>Parse D&D 5e creature stat blocks or spell descriptions with AI</p>
        </div>

        <div class="parser-layout">
            <!-- Input Panel -->
            <div class="panel">
                <h2>Input Content</h2>
                
                <div class="form-group">
                    <label>Content Type</label>
                    <div style="display: flex; gap: 1rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="radio" name="contentType" value="creature" checked>
                            🗡️ Creature
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="radio" name="contentType" value="spell">
                            ✨ Spell
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="contentInput" id="contentLabel">Creature Stat Block</label>
                    <textarea id="contentInput" placeholder="Paste D&D 5e creature stat block here...

Example:
Goblin
Small humanoid (goblinoid), neutral evil
Armor Class 15 (leather armor, shield)
Hit Points 7 (2d6)
Speed 30 ft.

STR 8 (-1)  DEX 14 (+2)  CON 10 (+0)  INT 10 (+0)  WIS 8 (-1)  CHA 8 (-1)

..."></textarea>
                </div>

                <div class="form-group">
                    <label for="modelPath">Model Path (Optional)</label>
                    <input type="text" id="modelPath" placeholder="/path/to/model.gguf">
                </div>

                <div class="button-group">
                    <button class="btn-parse" id="parseBtn">Queue for Processing</button>
                    <button class="btn-clear" id="clearBtn">Clear</button>
                </div>

                <div class="status-message" id="statusMessage"></div>
            </div>
        </div>
    </div>

    <script>
        const contentTypeInputs = document.querySelectorAll('input[name="contentType"]');
        const contentInput = document.getElementById('contentInput');
        const contentLabel = document.getElementById('contentLabel');
        const modelPathInput = document.getElementById('modelPath');
        const parseBtn = document.getElementById('parseBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        let currentJobId = null;      // Current job tracking
        let pollIntervalId = null;    // Polling interval handle
        let currentContentType = 'creature';  // Current content type

        // Content type toggle
        contentTypeInputs.forEach(input => {
            input.addEventListener('change', (e) => {
                currentContentType = e.target.value;
                if (currentContentType === 'creature') {
                    contentLabel.textContent = 'Creature Stat Block';
                    contentInput.placeholder = `Paste D&D 5e creature stat block here...

Example:
Goblin
Small humanoid (goblinoid), neutral evil
Armor Class 15 (leather armor, shield)
Hit Points 7 (2d6)
Speed 30 ft.

STR 8 (-1)  DEX 14 (+2)  CON 10 (+0)  INT 10 (+0)  WIS 8 (-1)  CHA 8 (-1)

...`;
                } else {
                    contentLabel.textContent = 'Spell Description';
                    contentInput.placeholder = `Paste D&D 5e spell description here...

Example:
Ice Knife
Legacy
Level: 1st
Casting Time: 1 Action
Range/Area: 60 ft. (5 ft. *)
Components: S, M *
Duration: Instantaneous
School: Conjuration
Attack/Save: DEX Save
Damage/Effect: Piercing (...)

You create a shard of ice and fling it at one creature within range...

...`;
                }
                contentInput.value = '';
                contentInput.focus();
            });
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            contentInput.value = '';
            modelPathInput.value = '';
            statusMessage.textContent = '';
            contentInput.focus();
        });

        // Parse button
        parseBtn.addEventListener('click', async () => {
            const contentValue = contentInput.value.trim();
            const modelPathValue = modelPathInput.value.trim();
            
            if (!contentValue) {
                showStatus(`Please paste a ${currentContentType === 'creature' ? 'stat block' : 'spell description'}`, 'error');
                return;
            }

            showStatus('Submitting to queue...', 'loading');

            try {
                const payload = {
                    statblock: contentValue,
                    job_type: currentContentType
                };

                if (modelPathValue) {
                    payload.model_path = modelPathValue;
                }

                // Submit job to queue
                const response = await fetch('/api/queue/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success && data.job_id) {
                    currentJobId = data.job_id;
                    showStatus(`✓ Job #${currentJobId} queued (${currentContentType})`, 'loading');
                    
                    // Clear form for next job
                    contentInput.value = '';
                    modelPathInput.value = '';
                    contentInput.focus();
                    
                    // Start polling (runs in background)
                    startPolling();
                } else {
                    showStatus(data.error || 'Failed to submit job', 'error');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        });

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
            statusMessage.classList.add('show');
        }

        function startPolling() {
            // Poll job status every 2 seconds
            pollIntervalId = setInterval(pollJobStatus, 2000);
            // Also poll immediately
            pollJobStatus();
        }

        async function pollJobStatus() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/api/queue/${currentJobId}`);
                const job = await response.json();

                if (job.error) {
                    showStatus(`Job #${currentJobId} not found: ${job.error}`, 'error');
                    if (pollIntervalId) clearInterval(pollIntervalId);
                    return;
                }

                // Update status
                let statusText = `[Job #${currentJobId}] `;
                let statusType = 'loading';

                switch (job.status) {
                    case 'pending':
                        statusText += `⏳ Pending (in queue...)`;
                        break;
                    case 'processing':
                        const progress = job.progress_percent || 0;
                        statusText += `⚙️ Processing... ${progress}%`;
                        break;
                    case 'completed':
                        const resourceType = job.job_type === 'spell' ? 'spell' : 'creature';
                        const resourceId = job.job_type === 'spell' ? job.spell_id : job.creature_id;
                        
                        if (resourceId) {
                            statusText += `✓ Complete! ${resourceType.charAt(0).toUpperCase() + resourceType.slice(1)} #${resourceId} saved`;
                            statusType = 'success';
                        } else {
                            statusText += `✓ Parsing complete (no ${resourceType} created)`;
                            statusType = 'success';
                        }
                        
                        // Stop polling for this job
                        if (pollIntervalId) clearInterval(pollIntervalId);
                        currentJobId = null;
                        break;
                    
                    case 'failed':
                        statusText += `✗ Failed: ${job.error_message || 'Unknown error'}`;
                        statusType = 'error';
                        if (pollIntervalId) clearInterval(pollIntervalId);
                        currentJobId = null;
                        break;
                }

                showStatus(statusText, statusType);

            } catch (error) {
                console.error('Poll error:', error);
                // Don't show error for network issues, just keep polling
            }
        }

        // Auto-focus on load
        contentInput.focus();
    </script>
</body>
</html>
