<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Spell Detail — D&D Kids Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/page-layout.css">
  <script src="../js/card-generator.js"></script>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      background: #f4f4f8;
      color: #222;
      font-family: 'Nunito', sans-serif;
    }
    .detail-shell {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .detail-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .detail-title {
      margin: 0;
      font-size: 2rem;
      color: #333;
      line-height: 1.05;
    }
    .detail-subtitle {
      margin: 0.5rem 0 0;
      color: #555;
      font-size: 0.98rem;
    }
    .detail-panel {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      border: 1px solid #e3e3e8;
    }
    .spell-detail-card {
      width: 100%;
      max-width: 100%;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #1a73e8;
      text-decoration: none;
      font-weight: 700;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .loading,
    .error-message {
      padding: 1.25rem;
      background: white;
      border-radius: 12px;
      border: 1px solid #e3e3e8;
      box-shadow: 0 10px 28px rgba(0,0,0,0.05);
      max-width: 800px;
      margin: 2rem auto;
      text-align: center;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="detail-shell">
    <div class="detail-header">
      <div>
        <h1 id="spellTitle" class="detail-title">Spell Detail</h1>
        <p id="spellSubtitle" class="detail-subtitle">Loading spell details...</p>
      </div>
      <a href="#" class="back-link" id="backLink">← Back</a>
    </div>
    <div id="spellContent">
      <div class="loading">Loading spell details…</div>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showLoading(message) {
      const content = document.getElementById('spellContent');
      content.innerHTML = `<div class="loading">${escapeHtml(message)}</div>`;
    }

    function showError(message) {
      const content = document.getElementById('spellContent');
      content.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function displaySpell(spell) {
      const content = document.getElementById('spellContent');
      content.innerHTML = '';
      document.getElementById('spellTitle').textContent = spell.title || spell.name || 'Spell Detail';
      document.getElementById('spellSubtitle').textContent = spell.school ? `${spell.level || ''} ${spell.school}`.trim() : '';
      document.title = `${spell.title || spell.name || 'Spell'} — Spell Detail`;

      const panel = document.createElement('div');
      panel.className = 'detail-panel spell-detail-card';
      const card = createCardElement(spell, null, { preview: true });
      panel.appendChild(card);
      content.appendChild(panel);
    }

    async function loadSpellDetail() {
      const title = getQueryParam('title');
      if (!title) {
        showError('No spell specified.');
        return;
      }

      showLoading(`Loading ${title}...`);
      try {
        const response = await fetch(`/api/spells/${encodeURIComponent(title)}`);
        if (!response.ok) {
          throw new Error(`Spell not found: ${title}`);
        }
        const data = await response.json();
        displaySpell(data);
      } catch (error) {
        showError(error.message || 'Error loading spell details.');
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const backLink = document.getElementById('backLink');
      backLink.addEventListener('click', function(event) {
        event.preventDefault();
        window.history.back();
      });
      loadSpellDetail();
    });
  </script>
</body>
</html>
