<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Encounter Editor — D&D Kids Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/page-layout.css">
</head>
<body>
  <header class="site-header">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
      <div>
        <h1>🗡️ Encounter Editor</h1>
        <p>Create, edit, and manage combat encounters for your campaign.</p>
      </div>
    </div>
  </header>

  <div id="page-pane-layout" class="dungeon-viewer-layout active">
    <!-- Sidebar: Encounter list/search -->
    <div id="viewer-sidebar" class="map-panel">
      <div id="resizeHandle" class="resize-handle" aria-label="Resize sidebar" tabindex="0" role="separator" aria-orientation="vertical"></div>
      <button id="showListPanelBtn" class="toggle-list-btn hidden" onclick="expandListPanel()" aria-label="Expand encounter list sidebar" tabindex="0">→</button>
      <label class="search-field" for="search-encounter-input">
        <span>Search Encounters</span>
        <input id="search-encounter-input" type="search" placeholder="Type an encounter name..." autocomplete="off" aria-label="Search Encounters" />
      </label>
      <div class="monster-book-meta">Encounters</div>
      <div id="encounter-count" class="monster-book-meta" aria-live="polite">Loading...</div>
      <div id="encounter-list" class="monster-list" aria-live="polite"></div>
      
      <!-- Monster browser: searchable, pageable list of monsters -->
      <div class="monster-book-meta" style="margin-top:12px;">Monsters</div>
      <label class="search-field compact-search" for="monster-search-input" style="margin-top:6px;">
        <span>Search Monsters</span>
        <input id="monster-search-input" type="search" placeholder="Search monsters by name, CR, or type..." autocomplete="off" aria-label="Search Monsters" />
      </label>
      <div id="monster-count" class="monster-book-meta" aria-live="polite" style="margin-top:8px;">Loading...</div>
      <div id="monster-browser" class="monster-list" aria-live="polite" role="list"></div>
      <div id="monster-pagination" style="display:flex; gap:8px; align-items:center; margin-top:8px;">
        <button id="monster-prev-btn" class="btn" aria-label="Previous page of monsters">Prev</button>
        <div id="monster-page-info" aria-live="polite" style="font-weight:700; color:#333;"></div>
        <button id="monster-next-btn" class="btn" aria-label="Next page of monsters">Next</button>
      </div>
    </div>

    <!-- Main panel: Encounter detail -->
    <div class="dungeon-viewer-right">
      <div class="viewer-controls controls-row" aria-label="Encounter controls" role="toolbar">
        <a href="resources.html" class="back-btn">← Resources</a>
        <span id="encounter-title-header" class="monster-title-header">Select or create an encounter</span>
        <button id="new-encounter-btn" class="back-btn" style="background: #4a90e2; margin-left: 0.5rem;" aria-label="Add new encounter">+ New Encounter</button>
        <button id="export-encounters-btn" class="back-btn" style="background: #7f8c8d; margin-left: 0.5rem;" aria-label="Export Encounters as JSON">Export JSON</button>
      </div>
      <div class="dungeon-content">
        <div id="encounter-detail-shell" class="monster-detail-shell">
          <div class="placeholder" role="status" aria-live="polite">
            <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
              <input id="add-monster-input" type="search" placeholder="Add monster..." autocomplete="off" style="flex:1; padding:6px;" />
              <button type="button" id="add-monster-btn" class="btn">Add</button>
            </div>
            Search, select, or create an encounter to view or edit details.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/dom-utils.js"></script>
  <script src="../js/data-utils.js"></script>
  <script src="../js/pane-resize.js"></script>
  <script src="../js/page-base.js"></script>
  <script>
    PageBase.autoInitializeViewerPane('encounterEditor', {
      defaultWidth: 350,
      maxWidthFraction: 0.6,
      collapseThreshold: 200,
      showBtnId: 'showListPanelBtn',
      layoutId: 'page-pane-layout',
      panelId: 'viewer-sidebar',
      handleId: 'resizeHandle'
    });
  </script>
  <script src="../js/encounter-editor.js"></script>
</body>
</html>
