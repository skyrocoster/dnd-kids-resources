        function addRoomWithTitle(title) {
            const data = currentDungeon.parsed_json;
            data.rooms = data.rooms || [];
            const nextRoomId = data.rooms.reduce((maxId, room) => Math.max(maxId, room.room_id || 0), 0) + 1;
            const newRoom = { room_id: nextRoomId, title, entries: [] };
            data.rooms.push(newRoom);
            saveDungeonChanges();
            return { room: newRoom, idx: data.rooms.length - 1 };
        }

        function getRoomById(roomId) {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const numericId = parseInt(roomId, 10);
            if (Number.isNaN(numericId)) return null;
            return rooms.find((room, idx) => {
                const actualId = room.room_id != null ? room.room_id : idx;
                return actualId === numericId;
            }) || null;
        }

        function findRoomIndexById(roomId) {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const numericId = parseInt(roomId, 10);
            if (Number.isNaN(numericId)) return -1;
            return rooms.findIndex((room, idx) => {
                const actualId = room.room_id != null ? room.room_id : idx;
                return actualId === numericId;
            });
        }

        function findRoomIndexByTitle(title) {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const target = normalizeRoomTitle(title);
            return rooms.findIndex(room => normalizeRoomTitle(room.title) === target);
        }

        function findRoomIndexByTarget(target) {
            if (target === null || target === undefined) return -1;
            const numericId = parseInt(String(target).trim(), 10);
            if (!Number.isNaN(numericId)) {
                const byId = findRoomIndexById(numericId);
                if (byId !== -1) return byId;
            }
            return findRoomIndexByTitle(String(target));
        }

        function createDoorReciprocalEntry(sourceRoomId, sourceRoomTitle, doorMechanics, trapIds) {
            const displayTitle = sourceRoomTitle || `Room ${sourceRoomId}`;
            return {
                entry_type: 'door',
                door_id: getNextDoorId(),
                title: `Door to ${displayTitle}`,
                content: null,
                leads_to: sourceRoomId,
                door_mechanics: doorMechanics || null,
                trap_ids: trapIds || [],
                is_hidden: false,
                hidden_dc: null
            };
        }

        function isDoorEntryTargetingRoom(entry, roomId, roomTitle) {
            if (!entry || entry.entry_type !== 'door' || entry.leads_to == null) return false;
            if (entry.leads_to === roomId) return true;
            if (typeof entry.leads_to === 'number' && typeof roomId === 'string') {
                return entry.leads_to === parseInt(roomId, 10);
            }
            if (typeof entry.leads_to === 'string') {
                const numericLead = parseInt(entry.leads_to, 10);
                if (!Number.isNaN(numericLead) && Number(numericLead) === Number(roomId)) return true;
                if (roomTitle) {
                    return normalizeRoomTitle(entry.leads_to) === normalizeRoomTitle(roomTitle);
                }
            }
            return false;
        }

        function ensureReciprocalDoor(sourceRoomIdx, targetRoomIdx, sourceRoomId, sourceRoomTitle, doorMechanics, trapIds) {
            if (targetRoomIdx === sourceRoomIdx) return;
            const data = currentDungeon.parsed_json;
            const targetRoom = data.rooms[targetRoomIdx];
            if (!targetRoom || !targetRoom.entries) return;

            const reciprocalExists = targetRoom.entries.some(entry => {
                if (entry.entry_type !== 'door') return false;
                if (entry.leads_to === sourceRoomId) return true;
                if (typeof entry.leads_to === 'string' && sourceRoomTitle) {
                    return normalizeRoomTitle(entry.leads_to) === normalizeRoomTitle(sourceRoomTitle);
                }
                return false;
            });

            if (!reciprocalExists) {
                targetRoom.entries.push(createDoorReciprocalEntry(sourceRoomId, sourceRoomTitle, doorMechanics, trapIds));
            }
        }

        function removeReciprocalDoor(sourceRoomIdx, doorEntry) {
            if (!doorEntry || doorEntry.entry_type !== 'door') return;
            const data = currentDungeon.parsed_json;
            const sourceRoom = data.rooms[sourceRoomIdx];
            if (!sourceRoom) return;
            const sourceRoomId = sourceRoom.room_id != null ? sourceRoom.room_id : sourceRoomIdx;
            const sourceRoomTitle = sourceRoom.title || '';
            const targetRoomIdx = findRoomIndexByTarget(doorEntry.leads_to);
            if (targetRoomIdx === -1) return;

            const targetRoom = data.rooms[targetRoomIdx];
            if (!targetRoom || !targetRoom.entries) return;

            targetRoom.entries = targetRoom.entries.filter(entry => !isDoorEntryTargetingRoom(entry, sourceRoomId, sourceRoomTitle));
        }

        function createRoom() {
            if (!currentDungeon) {
                alert('Open a dungeon before creating a room.');
                return;
            }

            const data = currentDungeon.parsed_json;
            data.rooms = data.rooms || [];
            const defaultTitle = `Room ${data.rooms.length + 1}`;
            let trimmedTitle = '';

            while (true) {
                const title = prompt('Room name:', defaultTitle);
                if (title === null) {
                    return;
                }

                trimmedTitle = title.trim() || defaultTitle;
                if (isRoomTitleTaken(trimmedTitle)) {
                    alert('A room with that title already exists. Please choose a different title.');
                    continue;
                }
                break;
            }

            const nextRoomId = data.rooms.reduce((maxId, room) => Math.max(maxId, room.room_id || 0), 0) + 1;
            const newRoom = {
                room_id: nextRoomId,
                title: trimmedTitle,
                entries: []
            };

            data.rooms.push(newRoom);

            // If floors are defined, add the new room to the currently selected floor.
            data.floors = data.floors || [];
            if (data.floors.length) {
                const selectedFloor = data.floors[currentFloorIdx] || data.floors[0];
                selectedFloor.room_ids = Array.isArray(selectedFloor.room_ids) ? selectedFloor.room_ids : [];
                if (!selectedFloor.room_ids.includes(nextRoomId)) {
                    selectedFloor.room_ids.push(nextRoomId);
                }
            }

            saveDungeonChanges();
            displayDungeonViewer();
            document.getElementById('roomSelector').value = data.rooms.length - 1;
            displayRoom(data.rooms.length - 1);
        }

        function saveFloorModal() {
            const titleInput = document.getElementById('floorTitle');
            const aboveSelect = document.getElementById('floorAbove');
            const belowSelect = document.getElementById('floorBelow');
            if (!titleInput || !aboveSelect || !belowSelect) return;

            const data = currentDungeon.parsed_json;
            data.floors = data.floors || [];
            const trimmedTitle = titleInput.value.trim() || `Floor ${data.floors.length + 1}`;
            const normalized = normalizeRoomTitle(trimmedTitle);
            if (data.floors.some(floor => normalizeRoomTitle(floor.title) === normalized)) {
                alert('A floor with that title already exists. Please choose a different name.');
                return;
            }

            const aboveId = aboveSelect.value ? parseInt(aboveSelect.value, 10) : null;
            const belowId = belowSelect.value ? parseInt(belowSelect.value, 10) : null;
            if (aboveId && belowId && aboveId === belowId) {
                alert('Floor above and floor below cannot be the same floor.');
                return;
            }

            const nextFloorId = data.floors.reduce((maxId, floor) => Math.max(maxId, floor.floor_id || 0), 0) + 1;
            const newFloor = {
                floor_id: nextFloorId,
                title: trimmedTitle,
                room_ids: [],
                floor_above: aboveId,
                floor_below: belowId
            };

            data.floors.push(newFloor);
            connectFloorNeighbors(newFloor);

            currentFloorIdx = data.floors.length - 1;
            saveDungeonChanges();
            closeCreateFloorModal();
            displayDungeonViewer();
            document.getElementById('floorSelector').value = currentFloorIdx;
        }

        function connectFloorNeighbors(newFloor) {
            const data = currentDungeon?.parsed_json;
            const floors = data?.floors || [];
            if (!newFloor.floor_above) {
                if (newFloor.floor_below) {
                    const belowFloor = floors.find(f => Number(f.floor_id) === Number(newFloor.floor_below));
                    if (belowFloor) {
                        belowFloor.floor_above = newFloor.floor_id;
                    }
                }
                return;
            }

            const aboveFloor = floors.find(f => Number(f.floor_id) === Number(newFloor.floor_above));
            if (aboveFloor) {
                aboveFloor.floor_below = newFloor.floor_id;
            }

            if (newFloor.floor_below) {
                const belowFloor = floors.find(f => Number(f.floor_id) === Number(newFloor.floor_below));
                if (belowFloor) {
                    belowFloor.floor_above = newFloor.floor_id;
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeJsString(text) {
            return String(text || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/\n/g, '\\n')
                .replace(/\r/g, '\\r');
        }

        function parseJsonValue(value) {
            if (typeof value !== 'string') return value;
            const trimmed = value.trim();
            if ((trimmed.startsWith('[') && trimmed.endsWith(']')) || (trimmed.startsWith('{') && trimmed.endsWith('}'))) {
                try {
                    return JSON.parse(trimmed);
                } catch (e) {
                    return value;
                }
            }
            return value;
        }

        function formatObjectValue(obj) {
            if (!obj || typeof obj !== 'object') return '';
            if (obj.name) return String(obj.name);

            const parts = [];
            for (const [key, value] of Object.entries(obj)) {
                if (value === null || value === undefined || value === '') continue;
                if (Array.isArray(value)) {
                    const formatted = value.map(item => formatDisplayValue(item)).filter(Boolean).join(', ');
                    if (formatted) parts.push(`${key}: ${formatted}`);
                } else if (typeof value === 'object') {
                    const formatted = formatObjectValue(value);
                    if (formatted) parts.push(`${key}: ${formatted}`);
                } else {
                    parts.push(`${key}: ${value}`);
                }
            }
            return parts.join(', ');
        }

        function formatDisplayValue(value) {
            const parsed = parseJsonValue(value);
            if (Array.isArray(parsed)) {
                return parsed.map(item => formatDisplayValue(item)).filter(Boolean).join(', ');
            }
            if (parsed && typeof parsed === 'object') {
                return formatObjectValue(parsed);
            }
            return String(parsed || '');
        }

            } else if (entry.entry_type === 'stairs') {
                const stairsRooms = document.getElementById('stairsRooms');
                const stairsFloors = document.getElementById('stairsFloors');
                loadRoomTargets(roomIdx, '');
                loadFloorOptions([]);
                if (stairsRooms && Array.isArray(entry.leads_to_rooms)) {
                    Array.from(stairsRooms.options).forEach(option => {
                        option.selected = entry.leads_to_rooms.includes(parseInt(option.value, 10));
                    });
                }
                if (stairsFloors && Array.isArray(entry.leads_to_floors)) {
                    Array.from(stairsFloors.options).forEach(option => {
                        option.selected = entry.leads_to_floors.includes(parseInt(option.value, 10));
                    });
                }
            }

            // Set trap single-select
            const doorTrapSelect = document.getElementById('doorTrapIds');
            doorTrapSelect.value = '';
            if (entry.trap_ids && entry.trap_ids.length > 0) {
                doorTrapSelect.value = entry.trap_ids[0];
            }
            
            // Treasure fields
            document.getElementById('treasureContainer').value = entry.container || '';
            document.getElementById('treasureMechanics').value = entry.container_mechanics || '';
            document.getElementById('treasureIsHidden').checked = entry.is_hidden || false;
            document.getElementById('treasureHiddenDC').value = entry.hidden_dc || '';
            
            // Reconstruct items text from treasure_contents
            if (entry.treasure_contents && entry.treasure_contents.length > 0) {
                const itemsText = entry.treasure_contents.map(item => {
                    const qty = item.quantity || 1;
                    const value = item.value ? ` (${item.value})` : '';
                    return `${qty} x ${item.name}${value}`;
                }).join('\n');
                document.getElementById('treasureItems').value = itemsText;
            } else {
                document.getElementById('treasureItems').value = '';
            }
            
            // Set monster selector if it's a monster
            if (entry.entry_type === 'monster' && (entry.monster_id || entry.creature_id)) {
                document.getElementById('featureMonster').value = entry.monster_id || entry.creature_id;
            }
            
            loadMonstersForModal();
            loadNpcsForModal();
            loadTrapsForModal();
            updateFeatureFields();
            document.getElementById('featureTitle').focus();
        }

        function renderModalMonsterResults(query) {
            const results = document.getElementById('featureMonsterResults');
            if (!results) return;
            results.style.display = 'block';
            results.innerHTML = '';

            const normalizedQuery = String(query || '').trim().toLowerCase();
            let matches = normalizedQuery
                ? modalMonsters.filter(monster => String(monster.title || '').toLowerCase().includes(normalizedQuery))
                : modalMonsters.slice(0, 15);

            if (!normalizedQuery && selectedModalMonsterId) {
                const selectedIndex = matches.findIndex(monster => String(monster.id) === String(selectedModalMonsterId));
                if (selectedIndex === -1) {
                    const selectedMonster = modalMonsters.find(monster => String(monster.id) === String(selectedModalMonsterId));
                    if (selectedMonster) {
                        matches = [selectedMonster, ...matches].slice(0, 15);
                    }
                }
            }

            if (matches.length === 0) {
                results.innerHTML = '<div class="monster-search-placeholder">No monsters found.</div>';
                return;
            }

            matches.slice(0, 15).forEach(monster => {
                const item = document.createElement('div');
                item.className = 'monster-search-item' + (selectedModalMonsterId === String(monster.id) ? ' selected' : '');
                item.dataset.id = monster.id;
                item.dataset.title = monster.title;
                item.innerHTML = `
                    <div class="monster-search-item-title">${escapeHtml(monster.title)}</div>
                    <div class="monster-search-item-subtitle">${escapeHtml(monster.explanation || monster.type || '')}</div>
                `;
                item.addEventListener('click', () => selectModalMonster(String(monster.id), monster.title));
                results.appendChild(item);
            });
        }

        function updateFeatureFields() {
            const featureType = document.getElementById('featureType').value;
            
            // Hide all conditional fields
            document.querySelectorAll('.modal-field.field-monster, .modal-field.field-door, .modal-field.field-stairs, .modal-field.field-access, .modal-field.field-monster-selector, .modal-field.field-npc-selector, .modal-field.field-title, .modal-field.field-treasure').forEach(field => {
                field.classList.add('hidden');
            });
            
            // Show title field for non-monster and non-NPC types
            if (featureType !== 'monster' && featureType !== 'npc') {
                document.querySelector('.modal-field.field-title').classList.remove('hidden');
            }
            
            // Show fields based on type
            if (featureType === 'monster') {
                document.querySelector('.modal-field.field-monster-selector').classList.remove('hidden');
                document.querySelector('.modal-field.field-monster').classList.remove('hidden');
            } else if (featureType === 'npc') {
                document.querySelector('.modal-field.field-npc-selector').classList.remove('hidden');
            } else if (featureType === 'door') {
                document.querySelectorAll('.modal-field.field-door').forEach(field => {
                    field.classList.remove('hidden');
                });
                document.querySelectorAll('.modal-field.field-access').forEach(field => {
                    field.classList.remove('hidden');
                });
                const selectedRoomIdx = currentRoomIdx !== null ? currentRoomIdx : null;
                loadRoomTargets(selectedRoomIdx, document.getElementById('featureLeadsTo').value);
            } else if (featureType === 'stairs') {
                document.querySelectorAll('.modal-field.field-stairs').forEach(field => {
                    field.classList.remove('hidden');
                });
                document.querySelectorAll('.modal-field.field-access').forEach(field => {
                    field.classList.remove('hidden');
                });
                const selectedRoomIdx = currentRoomIdx !== null ? currentRoomIdx : null;
                loadRoomTargets(selectedRoomIdx, '');
                loadFloorOptions([]);
            } else if (featureType === 'treasure') {
                document.querySelectorAll('.modal-field.field-treasure').forEach(field => {
                    field.classList.remove('hidden');
                });
            }
        }

        function saveNewFeature() {
            // If editing, call saveEditedEntry instead
            if (isEditingEntry) {
                return saveEditedEntry();
            }
            
            const selector = document.getElementById('roomSelector');
            const roomIdx = parseInt(selector.value);
            
            if (isNaN(roomIdx)) {
                alert('Please select a room first');
                return;
            }

            const type = document.getElementById('featureType').value;
            
            // Get title based on feature type
            let title = '';
            let monsterId = null;
            
            if (type === 'monster') {
                const monsterInput = document.getElementById('featureMonster');
                const monsterSearch = document.getElementById('featureMonsterSearch');
                monsterId = monsterInput.value;
                title = monsterSearch.value.trim();

                if (!monsterId || !title) {
                    alert('Please select a monster');
                    return;
                }
            } else {
                // For other types, use title input
                title = document.getElementById('featureTitle').value.trim();
                if (!title && type !== 'treasure' && type !== 'npc') {
                    alert('Please enter a title');
                    return;
                }
            }

            const content = document.getElementById('featureContent').value.trim();
            const count = parseInt(document.getElementById('featureCount').value) || 1;
            const leadsToValue = document.getElementById('featureLeadsTo') ? document.getElementById('featureLeadsTo').value : '';
            const leadsTo = leadsToValue && leadsToValue !== '__create_new_room__'
                ? (isNaN(parseInt(leadsToValue, 10)) ? leadsToValue.trim() : parseInt(leadsToValue, 10))
                : null;
            const doorMechanics = document.getElementById('doorMechanics').value.trim();
            
            const stairsRooms = getSelectedValues('stairsRooms');
            const stairsFloors = getSelectedValues('stairsFloors');
            
            if (type === 'door' && !leadsTo) {
                alert('Please select or create a target room for the door.');
                return;
            }
            if (type === 'stairs' && !stairsRooms.length && !stairsFloors.length) {
                alert('Please select at least one room or one floor for the stairs.');
                return;
            }

            // Get selected trap ID from single-select
            const doorTrapSelect = document.getElementById('doorTrapIds');
            const doorTrapId = doorTrapSelect.value ? parseInt(doorTrapSelect.value) : null;
            const doorTrapIds = doorTrapId ? [doorTrapId] : [];

            const data = currentDungeon.parsed_json;
            const room = data.rooms[roomIdx];
            const sourceRoomTitle = room.title || '';
            const sourceRoomId = room.room_id != null ? room.room_id : roomIdx;

            // Create new entry
            if (type === 'monster' && count > 1) {
                // Add multiple entries for each creature
                for (let i = 1; i <= count; i++) {
                    room.entries.push({
                        entry_type: type,
                        title: title,
                        content: content,
                        count: count,
                        creature_index: i,
                        creature_total: count,
                        monster_id: monsterId,
                        leads_to: leadsTo,
                        trap_ids: [],
                        is_hidden: false,
                        hidden_dc: null,
                        container: null,
                        container_mechanics: null,
                        treasure_contents: []
                    });
                }
            } else if (type === 'npc') {
                const npcInput = document.getElementById('featureNpc');
                const npcSearch = document.getElementById('featureNpcSearch');
                const npcId = npcInput.value;
                const npcName = npcSearch.value.trim();

                if (!npcId || !npcName) {
                    alert('Please select an NPC');
                    return;
                }

                room.npcs = Array.isArray(room.npcs) ? room.npcs : [];
                if (room.npcs.includes(npcName)) {
                    alert('This NPC is already in the room.');
                    return;
                }

                room.npcs.push(npcName);
            } else if (type === 'treasure') {
                // Handle treasure entries
                const container = document.getElementById('treasureContainer').value.trim();
                const mechanics = document.getElementById('treasureMechanics').value.trim();
                const isHidden = document.getElementById('treasureIsHidden').checked;
                const hiddenDC = isHidden ? (parseInt(document.getElementById('treasureHiddenDC').value) || null) : null;
                const itemsText = document.getElementById('treasureItems').value.trim();
                
                // Parse items
                const treasureContents = [];
                if (itemsText) {
                    const itemLines = itemsText.split('\n').filter(line => line.trim());
                    itemLines.forEach(line => {
                        // Try to parse "N x item (value)" format
                        const match = line.match(/(\d+)\s*x\s+(.+?)\s*(?:\(([^)]+)\))?$/);
                        if (match) {
                            treasureContents.push({
                                quantity: parseInt(match[1]),
                                name: match[2].trim(),
                                value: match[3] ? match[3].trim() : null
                            });
                        } else {
                            // Just a simple item
                            treasureContents.push({
                                quantity: 1,
                                name: line.trim(),
                                value: null
                            });
                        }
                    });
                }
                
                room.entries.push({
                    entry_type: type,
                    title: title,
                    content: content,
                    count: null,
                    creature_index: null,
                    creature_total: null,
                    monster_id: null,
                    leads_to: null,
                    trap_ids: [],
                    is_hidden: isHidden,
                    hidden_dc: hiddenDC,
                    container: container || null,
                    container_mechanics: mechanics || null,
                    treasure_contents: treasureContents
                });
            } else if (type === 'stairs') {
                data.stairs = data.stairs || [];
                const roomIds = Array.from(new Set([sourceRoomId, ...stairsRooms.map(val => Number(val))]));
                data.stairs.push({
                    entry_type: 'stairs',
                    stair_id: getNextStairId(),
                    title: title || 'Stairs',
                    content: content,
                    leads_to_rooms: roomIds,
                    leads_to_floors: stairsFloors.length ? stairsFloors.map(val => Number(val)) : [],
                    door_mechanics: doorMechanics || null,
                    trap_ids: doorTrapIds,
                    is_hidden: false,
                    hidden_dc: null
                });
            } else {
                if (type === 'door') {
                    const targetRoomId = parseInt(leadsTo, 10);
                    if (Number.isNaN(targetRoomId) || targetRoomId === sourceRoomId) {
                        alert('Please select a different target room for the door.');
                        return;
                    }
                    data.doors = data.doors || [];
                    data.doors.push({
                        entry_type: 'door',
                        door_id: getNextDoorId(),
                        title: title,
                        content: content,
                        leads_to: [sourceRoomId, targetRoomId],
                        door_mechanics: doorMechanics || null,
                        trap_ids: doorTrapIds,
                        is_hidden: false,
                        hidden_dc: null
                    });
                } else {
                    room.entries.push({
                        entry_type: type,
                        door_id: null,
                        title: title,
                        content: content,
                        count: type === 'monster' ? count : null,
                        creature_index: type === 'monster' ? 1 : null,
                        creature_total: type === 'monster' ? count : null,
                        monster_id: monsterId,
                        leads_to: leadsTo,
                        door_mechanics: null,
                        trap_ids: [],
                        is_hidden: false,
                        hidden_dc: null,
                        container: null,
                        container_mechanics: null,
                        treasure_contents: []
                    });
                }
            }

            // Refresh display and save
            displayRoom(roomIdx);
            saveDungeonChanges();
            closeAddFeatureModal();
        }

        function saveEditedEntry() {
            if (!isEditingEntry || currentRoomIdx === null) {
                return saveNewFeature();
            }

            const data = currentDungeon.parsed_json;
            const room = data.rooms[currentRoomIdx];
            const selectedLeadsTo = document.getElementById('featureLeadsTo').value;
            const leadsTo = selectedLeadsTo && selectedLeadsTo !== '__create_new_room__'
                ? (isNaN(parseInt(selectedLeadsTo, 10)) ? selectedLeadsTo.trim() : parseInt(selectedLeadsTo, 10))
                : null;
            const doorMechanics = document.getElementById('doorMechanics').value.trim();
            const doorTrapSelect = document.getElementById('doorTrapIds');
            const doorTrapId = doorTrapSelect.value ? parseInt(doorTrapSelect.value) : null;
            const doorTrapIds = doorTrapId ? [doorTrapId] : [];

            if (currentDoorId != null) {
                const door = (data.doors || []).find(d => String(d.door_id) === String(currentDoorId));
                if (!door) return;
                const sourceRoomId = getRoomIdFromIndex(currentRoomIdx);
                const targetRoomId = parseInt(leadsTo, 10);
                if (!leadsTo || Number.isNaN(targetRoomId) || targetRoomId === sourceRoomId) {
                    alert('Please select a different target room for the door.');
                    return;
                }
                const title = document.getElementById('featureTitle').value.trim();
                door.title = title || door.title;
                door.content = document.getElementById('featureContent').value.trim();
                door.door_mechanics = doorMechanics || null;
                door.trap_ids = doorTrapIds;
                door.leads_to = [sourceRoomId, targetRoomId];

                displayRoom(currentRoomIdx);
                saveDungeonChanges();
                closeAddFeatureModal();
                return;
            }

            const entry = room.entries[currentEntryIdx];
            if (!entry) return;

            const entryType = entry.entry_type;
            const content = document.getElementById('featureContent').value.trim();
            entry.content = content;
            entry.trap_ids = doorTrapIds;
            entry.door_mechanics = doorMechanics || null;
            entry.leads_to = leadsTo;

            if (entryType === 'door' && !entry.leads_to) {
                alert('Please select or create a target room for the door.');
                return;
            }

            // Update type-specific fields
            if (entryType === 'monster') {
                const count = parseInt(document.getElementById('featureCount').value) || 1;
                const monsterInput = document.getElementById('featureMonster');
                const monsterSearch = document.getElementById('featureMonsterSearch');
                const monsterId = monsterInput.value;
                const monsterTitle = monsterSearch.value.trim();

                if (!monsterId || !monsterTitle) {
                    alert('Please select a monster');
                    return;
                }

                entry.count = count;
                entry.monster_id = monsterId;
                entry.title = monsterTitle;
            } else if (entryType === 'door') {
                entry.door_mechanics = doorMechanics || null;
                const targetRoomIdx = entry.leads_to ? findRoomIndexByTarget(entry.leads_to) : -1;
                const sourceRoomId = room.room_id != null ? room.room_id : currentRoomIdx;
                if (targetRoomIdx !== -1) {
                    ensureReciprocalDoor(currentRoomIdx, targetRoomIdx, sourceRoomId, room.title || '', doorMechanics, entry.trap_ids || []);
                }
            } else if (entryType === 'stairs') {
                const selectedRooms = getSelectedValues('stairsRooms').map(val => Number(val));
                const selectedFloors = getSelectedValues('stairsFloors').map(val => Number(val));
                if (!selectedRooms.length && !selectedFloors.length) {
                    alert('Please select at least one room or one floor for the stairs.');
                    return;
                }
                const sourceRoomId = getRoomIdFromIndex(currentRoomIdx);
                entry.leads_to_rooms = Array.from(new Set([sourceRoomId, ...selectedRooms]));
                entry.leads_to_floors = selectedFloors;
                entry.door_mechanics = doorMechanics || null;
                entry.trap_ids = doorTrapIds;
            } else if (entryType === 'npc') {
                const npcInput = document.getElementById('featureNpc');
                const npcSearch = document.getElementById('featureNpcSearch');
                const npcId = npcInput.value;
                const npcName = npcSearch.value.trim();

                if (!npcId || !npcName) {
                    alert('Please select an NPC');
                    return;
                }

                const previousNpcName = entry.npc_name || entry.title || '';
                entry.npc_name = npcName;
                entry.title = npcName;
                room.npcs = Array.isArray(room.npcs) ? room.npcs.filter(name => String(name) !== String(previousNpcName)) : [];
                if (!room.npcs.includes(npcName)) {
                    room.npcs.push(npcName);
                }
            } else if (entryType === 'treasure') {
                const container = document.getElementById('treasureContainer').value.trim();
                const mechanics = document.getElementById('treasureMechanics').value.trim();
                const isHidden = document.getElementById('treasureIsHidden').checked;
                const hiddenDC = isHidden ? (parseInt(document.getElementById('treasureHiddenDC').value) || null) : null;
                const itemsText = document.getElementById('treasureItems').value.trim();

                entry.container = container || null;
                entry.container_mechanics = mechanics || null;
                entry.is_hidden = isHidden;
                entry.hidden_dc = hiddenDC;

                // Parse items
                const treasureContents = [];
                if (itemsText) {
                    const itemLines = itemsText.split('\n').filter(line => line.trim());
                    itemLines.forEach(line => {
                        const match = line.match(/(\d+)\s*x\s+(.+?)\s*(?:\(([^)]+)\))?$/);
                        if (match) {
                            treasureContents.push({
                                quantity: parseInt(match[1]),
                                name: match[2].trim(),
                                value: match[3] ? match[3].trim() : null
                            });
                        } else {
                            treasureContents.push({
                                quantity: 1,
                                name: line.trim(),
                                value: null
                            });
                        }
                    });
                }
                entry.treasure_contents = treasureContents;
            } else {
                // Update title for non-monster types
                const title = document.getElementById('featureTitle').value.trim();
                if (title) {
                    entry.title = title;
                }
            }

            // Refresh display and save
            displayRoom(currentRoomIdx);
            saveDungeonChanges();
            closeAddFeatureModal();
        }

        function saveDungeonChanges() {
            if (!currentDungeon) return;

            const dungeonId = currentDungeon.id;
            const updatedJson = JSON.stringify(currentDungeon.parsed_json);

            // Save to database
            fetch(`/api/dungeons/${dungeonId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ parsed_json: updatedJson })
            })
            .then(res => res.json())
            .then(data => {
                console.log('✓ Changes saved');
            })
            .catch(err => {
                console.error('Error saving changes:', err);
                alert('Error saving changes: ' + err.message);
            });
        }

        // Close modal when clicking outside of it
        document.addEventListener('click', (e) => {
            const featureModal = document.getElementById('featureModal');
            const floorModal = document.getElementById('floorModal');
            if (e.target === featureModal) {
                closeAddFeatureModal();
            }
            if (e.target === floorModal) {
                closeCreateFloorModal();
            }
        });

        // Tab switching for dungeon info and corridors
        function switchInfoTab(event, tabName) {
            // Hide all tab contents
            const contents = document.querySelectorAll('.info-tab-content');
            contents.forEach(content => content.classList.remove('active'));

            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.info-tab');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Show selected tab content
            const selectedContent = document.getElementById(tabName);
            if (selectedContent) {
                selectedContent.classList.add('active');
            }

            // Mark tab as active
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
