<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Library - D&D Kids Resources</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        :root {
            color-scheme: light dark;
        }

        body.dark-mode {
            background: #111;
            color: #eee;
        }

        body.dark-mode .site-header,
        body.dark-mode .viewer-controls,
        body.dark-mode .map-panel,
        body.dark-mode .dungeon-card,
        body.dark-mode .dungeon-content,
        body.dark-mode .entry,
        body.dark-mode .viewer-sidebar,
        body.dark-mode .info-tab,
        body.dark-mode .info-tab-content,
        body.dark-mode .modal-content {
            background: #1f2732;
            color: #eee;
            border-color: #2c3a46;
        }

        body.dark-mode .dungeon-card:hover {
            border-color: #4a90e2;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.25);
        }

        body.dark-mode .dungeon-card p,
        body.dark-mode .entry-content,
        body.dark-mode .entry-meta,
        body.dark-mode .door-mechanics,
        body.dark-mode .entry-traps,
        body.dark-mode .treasure-hidden,
        body.dark-mode .treasure-items,
        body.dark-mode .monster-search-item-subtitle,
        body.dark-mode .info-value {
            color: #cdd3db;
        }

        body.dark-mode .btn,
        body.dark-mode .back-btn,
        body.dark-mode .add-room-btn,
        body.dark-mode .add-feature-btn,
        body.dark-mode .entry-edit-btn,
        body.dark-mode .entry-delete-btn,
        body.dark-mode .edit-mode-toggle,
        body.dark-mode .modal-buttons .save-btn,
        body.dark-mode .modal-buttons .cancel-btn {
            background: #2c3a46;
            color: #eee;
            border-color: transparent;
        }

        body.dark-mode .btn:hover,
        body.dark-mode .back-btn:hover,
        body.dark-mode .add-room-btn:hover,
        body.dark-mode .add-feature-btn:hover,
        body.dark-mode .entry-edit-btn:hover,
        body.dark-mode .entry-delete-btn:hover,
        body.dark-mode .edit-mode-toggle:hover,
        body.dark-mode .modal-buttons .save-btn:hover,
        body.dark-mode .modal-buttons .cancel-btn:hover {
            background: #3b4a57;
        }

        body.dark-mode input,
        body.dark-mode select,
        body.dark-mode textarea {
            background: #16202b;
            color: #eee;
            border-color: #2c3a46;
        }

        .dungeons-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .dungeon-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .dungeon-card {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .dungeon-card:hover {
            border-color: #4a90e2;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
            transform: translateY(-2px);
        }

        .dungeon-card h3 {
            margin: 0 0 0.5rem 0;
            color: #333;
        }

        .dungeon-card p {
            margin: 0.25rem 0;
            color: #666;
            font-size: 0.9rem;
        }

        .dungeon-card .meta {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            text-align: right;
        }

        .dungeon-card .btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .dungeon-card .btn:hover {
            background: #357abd;
        }

        .dark-mode-toggle {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s ease;
            margin-left: 1rem;
        }

        .dark-mode-toggle.active {
            background: #f1c40f;
            color: #111;
        }

        .dark-mode-toggle:hover {
            background: #2c80d4;
        }

        .dungeon-viewer-layout {
            display: none;
            grid-template-columns: 350px 1fr;
            gap: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .dungeon-viewer-layout.active {
            display: grid;
        }

        .map-panel {
            background: #f5f5f5;
            padding: 1.5rem;
            border-radius: 0;
            overflow-y: scroll;
            height: 100%;
            position: relative;
            border-right: 1px solid #ddd;
            padding-right: calc(1.5rem + 5px);
        }

        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            width: 5px;
            height: 100%;
            background: #ccc;
            cursor: col-resize;
            user-select: none;
            transition: background 0.2s ease;
            z-index: 10;
        }

        .resize-handle:hover {
            background: #999;
        }

        .map-display {
            margin-bottom: 1.5rem;
        }

        .map-container {
            text-align: center;
        }

        .map-container img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .map-details-display {
            width: 100%;
        }

        .dungeon-viewer-right {
            display: flex;
            flex-direction: column;
            background: white;
            height: 100%;
            overflow: hidden;
        }

        .viewer-controls {
            background: #f5f5f5;
            padding: 1.5rem;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        .viewer-controls h3 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .dungeon-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            min-height: 0;
        }

        .dungeon-viewer {
            display: none;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .dungeon-viewer.active {
            display: grid;
        }

        .viewer-sidebar {
            background: #f5f5f5;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .viewer-sidebar h3 {
            display: none;
        }

        .room-content {
            margin-bottom: 2rem;
        }

        .room-title {
            font-size: 1.5rem;
            color: #333;
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #4a90e2;
        }

        .entry-group {
            margin: 1.5rem 0;
        }

        .entry-group-title {
            font-weight: bold;
            color: #4a90e2;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin: 1rem 0 0.5rem 0;
            letter-spacing: 0.05em;
        }

        .entry {
            background: #f9f9f9;
            padding: 1rem;
            margin: 0.5rem 0;
            border-left: 3px solid #4a90e2;
            border-radius: 4px;
        }

        .entry-title {
            font-weight: bold;
            color: #333;
            margin: 0 0 0.5rem 0;
        }

        .entry-content {
            color: #666;
            margin: 0.5rem 0;
            line-height: 1.5;
        }

        .entry-meta {
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .door-mechanics {
            font-size: 0.9rem;
            color: #2471a3;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background-color: #ebf5fb;
            border-left: 3px solid #2471a3;
            border-radius: 3px;
            font-weight: 500;
        }

        .entry-traps {
            font-size: 0.9rem;
            color: #c0392b;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background-color: #fadbd8;
            border-left: 3px solid #c0392b;
            border-radius: 3px;
            font-weight: 500;
        }

        .treasure-hidden {
            font-size: 0.9rem;
            color: #8e44ad;
            margin-top: 0.25rem;
            padding: 0.25rem 0;
            background-color: transparent;
            border-left: none;
            border-radius: 0;
            font-weight: 500;
        }

        .treasure-items {
            font-size: 0.9rem;
            color: #117a65;
            margin-top: 0.25rem;
            padding: 0;
            background-color: transparent;
            border-left: none;
            border-radius: 0;
            font-weight: normal;
        }

        .treasure-item {
            margin: 0.1rem 0;
            padding-left: 0;
            color: #0f5c39;
        }

        .room-link {
            color: #f39c12;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 2px solid #f39c12;
            transition: all 0.2s ease;
        }

        .room-link:hover {
            background-color: #fff4e6;
            padding: 2px 4px;
            border-bottom-color: #e67e22;
        }

        .info-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1rem;
            border-bottom: 2px solid #ddd;
        }

        .info-tab {
            padding: 0.75rem 1rem;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .info-tab:hover {
            background: #efefef;
        }

        .info-tab.active {
            background: white;
            color: #4a90e2;
            border-bottom-color: #4a90e2;
        }

        .info-tab-content {
            display: none;
            padding: 1rem 0;
        }

        .info-tab-content.active {
            display: block;
        }

        .info-tab-content h2 {
            margin-top: 0;
            color: #333;
        }

        .entry.monster {
            border-left-color: #e74c3c;
        }

        .entry.door {
            border-left-color: #f39c12;
        }

        .entry.trap {
            border-left-color: #e74c3c;
        }

        .entry.feature {
            border-left-color: #27ae60;
        }

        .entry.trick {
            border-left-color: #9b59b6;
        }

        .back-btn {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.3s ease;
        }

        .back-btn:hover {
            background: #687f8c;
        }

        .entry-actions {
            display: none;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #ddd;
        }

        body.edit-mode .entry-actions {
            display: flex;
        }

        .entry-actions button {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .entry-edit-btn {
            background: #3498db;
            color: white;
        }

        .entry-edit-btn:hover {
            background: #2980b9;
        }

        .entry-delete-btn {
            background: #e74c3c;
            color: white;
        }

        .entry-delete-btn:hover {
            background: #c0392b;
        }

        .edit-mode-toggle {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .edit-mode-toggle:hover {
            background: #7f8c8d;
        }

        .edit-mode-toggle.active {
            background: #e67e22;
            color: white;
        }

        .edit-mode-toggle.active:hover {
            background: #d35400;
        }

        .general-info {
            background: #f9f9f9;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 8px;
            border-left: 4px solid #4a90e2;
        }

        .info-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1rem;
            margin: 0.5rem 0;
        }

        .info-label {
            font-weight: bold;
            color: #4a90e2;
        }

        .info-value {
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
            border: 1px solid #f5c6cb;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        .add-feature-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.3s ease;
        }

        .add-feature-btn:hover {
            background: #229954;
        }

        .room-selector {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 500px;
        }

        .modal h3 {
            margin-top: 0;
            color: #333;
        }

        .modal-field {
            margin: 1rem 0;
        }

        .modal-field.hidden {
            display: none;
        }

        .modal-field label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .modal-field input,
        .modal-field select,
        .modal-field textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }

        .modal-field textarea {
            resize: vertical;
            min-height: 100px;
        }

        .monster-search-shell {
            position: relative;
        }

        .monster-search-shell input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }

        .monster-search-results {
            position: absolute;
            top: calc(100% + 0.25rem);
            left: 0;
            right: 0;
            max-height: 220px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
            z-index: 15;
        }

        .monster-search-item {
            padding: 0.75rem;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .monster-search-item:last-child {
            border-bottom: none;
        }

        .monster-search-item:hover,
        .monster-search-item.selected {
            background: #f0f7ff;
        }

        .monster-search-item-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .monster-search-item-subtitle {
            color: #666;
            font-size: 0.9rem;
        }

        .monster-search-placeholder {
            padding: 0.75rem;
            color: #777;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.3s ease;
        }

        .modal-buttons .save-btn {
            background: #4a90e2;
            color: white;
        }

        .modal-buttons .save-btn:hover {
            background: #357abd;
        }

        .modal-buttons .cancel-btn {
            background: #ddd;
            color: #333;
        }

        .modal-buttons .cancel-btn:hover {
            background: #ccc;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
            <div>
                <h1>🗺️ Dungeon Library</h1>
                <p>Explore and manage D&D dungeons</p>
            </div>
            <button id="darkModeToggle" class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>
    </header>

    <div class="dungeons-container">
        <!-- List View -->
        <div id="listView">
            <h2>Available Dungeons</h2>
            <div id="dungeonList" class="dungeon-list">
                <div class="loading">Loading dungeons...</div>
            </div>

            <!-- Upload Section -->
            <div style="margin: 2rem 0; padding: 1.5rem; background: #f5f5f5; border-radius: 8px;">
                <h3>Upload New Dungeon</h3>
                <form id="uploadForm" enctype="multipart/form-data">
                    <input type="file" id="dungeonFile" accept=".html" required style="padding: 0.5rem; margin: 0.5rem 0;">
                    <button type="submit" class="btn" style="background: #27ae60; padding: 0.75rem 1.5rem; border: none; color: white; border-radius: 4px; cursor: pointer;">
                        Upload Dungeon
                    </button>
                </form>
                <button class="btn" style="background: #4a90e2; padding: 0.75rem 1.5rem; border: none; color: white; border-radius: 4px; cursor: pointer; margin-top: 1rem;" onclick="createBlankDungeon()">
                    Create Blank Dungeon
                </button>
                <div id="uploadStatus" style="margin-top: 1rem; display: none;"></div>
            </div>
        </div>

        <!-- Dungeon Viewer Main Layout -->
        <div id="viewerView" class="dungeon-viewer-layout">
            <!-- Fixed Left Panel: Map and Map Details -->
            <div id="mapPanel" class="map-panel">
                <div id="resizeHandle" class="resize-handle"></div>
                <div id="mapDisplay" class="map-display"></div>
                <div id="mapDetailsDisplay" class="map-details-display"></div>
            </div>

            <!-- Right Panel: Controls and Scrollable Room Details -->
            <div class="dungeon-viewer-right">
                <div class="viewer-controls">
                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
                        <button class="back-btn" onclick="showListView()">← Back to List</button>
                        <button class="add-room-btn" onclick="createRoom()">➕ Add Room</button>
                        <button class="add-room-btn" onclick="createFloor()">🏗️ Add Floor</button>
                        <button class="add-feature-btn" onclick="openAddFeatureModal()">➕ Add Feature</button>
                        <button id="editModeBtn" class="edit-mode-toggle" onclick="toggleEditMode()" style="margin-bottom: 0;">✎ Edit Mode OFF</button>
                    </div>
                    <h3>Rooms</h3>
                    <div style="display: flex; gap: 0.75rem; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap;">
                        <label for="floorSelector" style="font-weight: 700; color: #334155; margin: 0;">Floor:</label>
                        <select id="floorSelector" class="room-selector" style="display: none; min-width: 180px;" onchange="onFloorSelectionChange()"></select>
                    </div>
                    <select id="roomSelector" class="room-selector" onchange="displaySelectedRoom()">
                        <option value="">Loading...</option>
                    </select>
                </div>

                <div class="dungeon-content" style="overflow-y: auto;">
                    <div id="roomDetailsDisplay">
                        <div class="loading">Loading dungeon...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Feature Modal -->
        <div id="featureModal" class="modal">
            <div class="modal-content">
                <h3 id="modalTitle">Add New Feature to Room</h3>
                <div class="modal-field">
                    <label>Feature Type:</label>
                    <select id="featureType" onchange="updateFeatureFields()">
                        <option value="feature">Feature</option>
                        <option value="monster">Monster</option>
                        <option value="treasure">Treasure</option>
                        <option value="door">Door</option>
                        <option value="stairs">Stairs</option>
                        <option value="npc">NPC</option>
                        <option value="trap">Trap</option>
                        <option value="trick">Trick</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="modal-field field-title">
                    <label>Title:</label>
                    <input type="text" id="featureTitle" placeholder="e.g., Treasure Chest" required>
                </div>
                <div class="modal-field field-monster-selector hidden">
                    <label>Monster:</label>
                    <div class="monster-search-shell">
                        <input type="search" id="featureMonsterSearch" placeholder="Type a monster name..." autocomplete="off">
                        <div id="featureMonsterResults" class="monster-search-results"></div>
                    </div>
                    <input type="hidden" id="featureMonster">
                </div>
                <div class="modal-field field-npc-selector hidden">
                    <label>NPC:</label>
                    <div class="monster-search-shell">
                        <input type="search" id="featureNpcSearch" placeholder="Type an NPC name..." autocomplete="off">
                        <div id="featureNpcResults" class="monster-search-results"></div>
                    </div>
                    <input type="hidden" id="featureNpc">
                </div>
                <div class="modal-field">
                    <label>Description:</label>
                    <textarea id="featureContent" placeholder="Describe this feature..."></textarea>
                </div>
                <div class="modal-field field-monster hidden">
                    <label>Count:</label>
                    <input type="number" id="featureCount" value="1" min="1">
                </div>
                <div class="modal-field field-door hidden">
                    <label>Leads to Room Title:</label>
                    <select id="featureLeadsTo" onchange="onRoomTargetChange()"></select>
                </div>
                <div class="modal-field field-stairs hidden">
                    <label>Stairs connect rooms:</label>
                    <select id="stairsRooms" multiple size="5"></select>
                </div>
                <div class="modal-field field-stairs hidden">
                    <label>Stairs connect floors:</label>
                    <select id="stairsFloors" multiple size="5"></select>
                </div>
                <div class="modal-field field-access hidden">
                    <label>Mechanics (optional):</label>
                    <input type="text" id="doorMechanics" placeholder="e.g., DC 20 to open, DC 25 to break; 60 hp">
                </div>
                <div class="modal-field field-access hidden">
                    <label>Associated Trap:</label>
                    <select id="doorTrapIds">
                        <option value="">Select a trap...</option>
                    </select>
                </div>
                <div class="modal-field field-treasure hidden">
                    <label>Container Name:</label>
                    <input type="text" id="treasureContainer" placeholder="e.g., Locked Iron Chest">
                </div>
                <div class="modal-field field-treasure hidden">
                    <label>Container Mechanics:</label>
                    <input type="text" id="treasureMechanics" placeholder="e.g., (DC 20 to unlock, DC 20 to break; 15 hp)">
                </div>
                <div class="modal-field field-treasure hidden">
                    <label><input type="checkbox" id="treasureIsHidden"> Hidden Treasure</label>
                </div>
                <div class="modal-field field-treasure hidden">
                    <label>Hidden DC:</label>
                    <input type="number" id="treasureHiddenDC" min="0" placeholder="e.g., 15">
                </div>
                <div class="modal-field field-treasure hidden">
                    <label>Items (one per line):</label>
                    <textarea id="treasureItems" placeholder="100 x gold coin&#10;2 x diamond (50 gp)&#10;Spell Scroll"></textarea>
                </div>
                <div class="modal-buttons">
                    <button class="cancel-btn" onclick="closeAddFeatureModal()">Cancel</button>
                    <button class="save-btn" onclick="saveNewFeature()">Save Feature</button>
                </div>
            </div>
        </div>

        <div id="floorModal" class="modal">
            <div class="modal-content">
                <h3 id="floorModalTitle">Add New Floor</h3>
                <div class="modal-field">
                    <label for="floorTitle">Floor Name:</label>
                    <input type="text" id="floorTitle" placeholder="e.g., Ground Floor">
                </div>
                <div class="modal-field">
                    <label for="floorAbove">Floor Above:</label>
                    <select id="floorAbove"></select>
                </div>
                <div class="modal-field">
                    <label for="floorBelow">Floor Below:</label>
                    <select id="floorBelow"></select>
                </div>
                <div class="modal-buttons">
                    <button class="cancel-btn" onclick="closeCreateFloorModal()">Cancel</button>
                    <button class="save-btn" onclick="saveFloorModal()">Save Floor</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDungeon = null;
        let dungeons = [];
        let currentRoomIdx = null;
        let currentEntryIdx = null;
        let currentDoorId = null;
        let currentFloorIdx = 0;
        let isEditingEntry = false;
        let editModeEnabled = false;
        let modalMonsters = [];
        let selectedModalMonsterId = null;
        let modalNpcs = [];
        let selectedModalNpcId = null;
        let cachedNpcs = null;

        // Initialize page based on URL hash
        let isResizing = false;

        // Initialize resize handle
        const resizeHandle = document.getElementById('resizeHandle');
        const layout = document.getElementById('viewerView');
        const mapPanel = document.getElementById('mapPanel');
        const monsterSearchInput = document.getElementById('featureMonsterSearch');
        const npcSearchInput = document.getElementById('featureNpcSearch');

        if (monsterSearchInput) {
            monsterSearchInput.addEventListener('input', (event) => {
                selectedModalMonsterId = null;
                const monsterInput = document.getElementById('featureMonster');
                if (monsterInput) monsterInput.value = '';
                renderModalMonsterResults(event.target.value);
            });
        }

        if (npcSearchInput) {
            npcSearchInput.addEventListener('input', (event) => {
                selectedModalNpcId = null;
                const npcInput = document.getElementById('featureNpc');
                if (npcInput) npcInput.value = '';
                renderModalNpcResults(event.target.value);
            });
        }

        resizeHandle.addEventListener('mousedown', () => {
            isResizing = true;
            document.body.style.userSelect = 'none';
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            const newWidth = e.clientX;
            const minWidth = 250;
            const maxWidth = window.innerWidth * 0.7;

            if (newWidth > minWidth && newWidth < maxWidth) {
                layout.style.gridTemplateColumns = `${newWidth}px 1fr`;
                // Store preference
                localStorage.setItem('dungeonMapPanelWidth', newWidth);
            }
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.userSelect = '';
            document.body.style.cursor = '';
        });

        // Load saved width preference
        const savedWidth = localStorage.getItem('dungeonMapPanelWidth');
        if (savedWidth) {
            layout.style.gridTemplateColumns = `${savedWidth}px 1fr`;
        }

        function initPage() {
            loadDarkModePreference();
            loadDungeonsList();
            
            // Check if a dungeon ID is in the URL hash
            const hash = window.location.hash.slice(1); // Remove # prefix
            if (hash.startsWith('dungeon/')) {
                const dungeonId = parseInt(hash.split('/')[1]);
                if (!isNaN(dungeonId)) {
                    // Load this dungeon directly
                    viewDungeon(dungeonId);
                    return;
                }
            }
        }

        // Listen for hash changes (back/forward buttons)
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (hash.startsWith('dungeon/')) {
                const dungeonId = parseInt(hash.split('/')[1]);
                if (!isNaN(dungeonId)) {
                    viewDungeon(dungeonId);
                }
            } else {
                showListView();
            }
        });

        // Call init when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPage);
        } else {
            initPage();
        }

        function loadDungeonsList() {
            console.log('Loading dungeons...');
            fetch('/api/dungeons')
                .then(res => {
                    console.log('Response:', res.status);
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    return res.json();
                })
                .then(data => {
                    console.log('Dungeons loaded:', data);
                    if (!Array.isArray(data)) {
                        throw new Error('API returned invalid data format');
                    }
                    dungeons = data;
                    displayDungeonsList();
                })
                .catch(err => {
                    console.error('Error loading dungeons:', err);
                    document.getElementById('dungeonList').innerHTML = 
                        '<div class="error-message">Error loading dungeons: ' + err.message + '</div>';
                });
        }

        function displayDungeonsList() {
            const container = document.getElementById('dungeonList');
            
            if (dungeons.length === 0) {
                container.innerHTML = '<div class="empty-state">No dungeons yet. Upload one to get started!</div>';
                return;
            }

            container.innerHTML = dungeons.map(dungeon => `
                <div class="dungeon-card">
                    <h3>${escapeHtml(dungeon.title)}</h3>
                    <p><strong>Created:</strong> ${new Date(dungeon.created_at).toLocaleDateString()}</p>
                    <div class="meta">
                        <button class="btn" onclick="viewDungeon(${dungeon.id})">View</button>
                    </div>
                </div>
            `).join('');
        }

        function viewDungeon(dungeonId) {
            // Set URL hash to preserve state on refresh
            window.location.hash = `dungeon/${dungeonId}`;
            
            fetch(`/api/dungeons/${dungeonId}`)
                .then(res => res.json())
                .then(data => {
                    currentDungeon = data;
                    showViewerView();
                    displayDungeonViewer();
                })
                .catch(err => {
                    console.error('Error loading dungeon:', err);
                    alert('Error loading dungeon: ' + err.message);
                });
        }

        function showViewerView() {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('viewerView').classList.add('active');
        }

        function showListView() {
            window.location.hash = '';
            document.getElementById('listView').style.display = 'block';
            document.getElementById('viewerView').classList.remove('active');
            currentDungeon = null;
        }

        function displayDungeonViewer() {
            if (!currentDungeon) return;

            if (ensureDoorIdsAssigned()) {
                saveDungeonChanges();
            }

            const data = currentDungeon.parsed_json;
            const rooms = data.rooms || [];
            if (currentFloorIdx == null || currentFloorIdx < 0) {
                currentFloorIdx = 0;
            }

            // Render floor selector if floors exist
            renderFloorSelector();
            populateRoomSelector();

            // Add keyboard navigation to room selector
            const selector = document.getElementById('roomSelector');
            selector.onkeydown = function(e) {
                // Only handle letter keys
                if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
                    e.preventDefault();
                    const searchLetter = e.key.toLowerCase();
                    const currentIndex = parseInt(this.value);
                    
                    // Start searching from the next option after the current one
                    for (let i = currentIndex + 1; i < this.options.length; i++) {
                        if (this.options[i].text.charAt(0).toLowerCase() === searchLetter) {
                            this.value = i;
                            displaySelectedRoom();
                            return;
                        }
                    }
                    // If not found after current, search from the beginning
                    for (let i = 0; i <= currentIndex; i++) {
                        if (this.options[i].text.charAt(0).toLowerCase() === searchLetter) {
                            this.value = i;
                            displaySelectedRoom();
                            return;
                        }
                    }
                }
            };

        }

        function getRoomIndicesForSelectedFloor() {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const floors = data?.floors || [];
            if (!floors.length) {
                return rooms.map((_, idx) => idx);
            }

            const selectedFloor = floors[currentFloorIdx] || floors[0];
            const roomIds = Array.isArray(selectedFloor.room_ids) ? selectedFloor.room_ids : [];
            return roomIds
                .map(roomId => findRoomIndexById(roomId))
                .filter(idx => idx !== -1);
        }

        function renderFloorSelector() {
            const data = currentDungeon?.parsed_json;
            const floors = data?.floors || [];
            const floorSelector = document.getElementById('floorSelector');
            if (!floorSelector) return;

            if (!floors.length) {
                floorSelector.style.display = 'none';
                return;
            }

            currentFloorIdx = Math.min(currentFloorIdx, floors.length - 1);
            floorSelector.style.display = 'inline-block';
            floorSelector.innerHTML = floors.map((floor, idx) => {
                const label = floor.title || `Floor ${floor.floor_id || idx + 1}`;
                return `<option value="${idx}">${escapeHtml(label)}</option>`;
            }).join('');
            floorSelector.value = currentFloorIdx;
        }

        function populateRoomSelector() {
            const selector = document.getElementById('roomSelector');
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const roomIndices = getRoomIndicesForSelectedFloor();

            if (roomIndices.length === 0) {
                selector.innerHTML = '<option value="">No rooms on this floor</option>';
                document.getElementById('roomDetailsDisplay').innerHTML = '<div class="empty-state">No rooms exist for this floor.</div>';
                document.getElementById('mapDisplay').innerHTML = '';
                document.getElementById('mapDetailsDisplay').innerHTML = '';
                return;
            }

            selector.innerHTML = roomIndices.map(idx => {
                const room = rooms[idx];
                const roomId = room.room_id !== undefined && room.room_id !== null ? room.room_id : idx;
                const roomLabel = room.title ? `${room.title} (Room ${roomId})` : `Room ${roomId}`;
                return `<option value="${idx}">${escapeHtml(roomLabel)}</option>`;
            }).join('');

            const selectedValue = selector.value || roomIndices[0];
            selector.value = selectedValue;
            displayRoom(parseInt(selectedValue, 10));
        }

        function onFloorSelectionChange() {
            const selector = document.getElementById('floorSelector');
            currentFloorIdx = parseInt(selector.value, 10) || 0;
            populateRoomSelector();
        }

        function displaySelectedRoom() {
            const selector = document.getElementById('roomSelector');
            const roomIdx = parseInt(selector.value);
            displayRoom(roomIdx);
        }

        function goToRoom(roomTarget) {
            const data = currentDungeon.parsed_json;
            const rooms = data.rooms || [];
            if (roomTarget === null || roomTarget === undefined) return;

            const targetValue = String(roomTarget).trim();
            if (!targetValue) return;

            let roomIdx = -1;
            const numericId = parseInt(targetValue, 10);
            if (!Number.isNaN(numericId)) {
                roomIdx = findRoomIndexById(numericId);
            }

            if (roomIdx === -1) {
                roomIdx = rooms.findIndex(room => String(room.title || '').trim() === targetValue);
            }

            if (roomIdx >= 0 && roomIdx < rooms.length) {
                document.getElementById('roomSelector').value = roomIdx;
                displayRoom(roomIdx);
            } else {
                console.warn(`Room "${roomTarget}" not found`);
            }
        }

        // Fetch monster details from DB by title (case-insensitive)
        async function getMonsterDetails(title) {
            try {
                const response = await fetch(`/api/monsters/${encodeURIComponent(title)}`);
                if (response.ok) {
                    return await response.json();
                }
            } catch (e) {
                console.warn(`Could not fetch monster details for ${title}:`, e);
            }
            return null;
        }

        async function getNpcDetails(name) {
            if (!name) return null;
            const normalized = String(name).trim().toLowerCase();

            async function loadCachedNpcs() {
                if (cachedNpcs) return cachedNpcs;
                try {
                    const response = await fetch('/api/npcs');
                    if (!response.ok) return [];
                    cachedNpcs = await response.json();
                } catch (e) {
                    console.warn(`Could not load NPC list for hover lookup:`, e);
                    cachedNpcs = [];
                }
                return cachedNpcs;
            }

            const npcs = await loadCachedNpcs();
            if (!Array.isArray(npcs) || npcs.length === 0) {
                return null;
            }

            let npc = npcs.find(item => String(item.name || '').trim().toLowerCase() === normalized);
            if (!npc) {
                npc = npcs.find(item => String(item.name || '').trim().toLowerCase().includes(normalized));
            }
            if (!npc) {
                npc = npcs.find(item => normalized.includes(String(item.name || '').trim().toLowerCase()));
            }
            return npc || null;
        }

        // Create and show monster card popup on hover
        function showMonsterCardPopup(monster, triggerElement) {
            // Remove any existing popup
            const existing = document.getElementById('monster-card-popup');
            if (existing) {
                existing.remove();
            }

            // Create popup container
            const popup = document.createElement('div');
            popup.id = 'monster-card-popup';
            popup.style.cssText = `
                position: fixed;
                z-index: 10000;
                background: white;
                border-radius: 8px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.3);
                width: auto;
                min-width: 280px;
                max-width: min(90vw, 420px);
                max-height: 500px;
                overflow-y: auto;
                padding: 12px;
                font-family: 'Nunito', sans-serif;
                pointer-events: auto;
                font-size: 13px;
            `;

            // Build card HTML
            let cardHtml = `
                <div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 2px solid #4a90e2;">
                    <div style="font-size: 16px; margin-bottom: 4px;">
                        <span style="font-size: 18px; margin-right: 4px;">${monster.icon || ''}</span>
                        <span style="font-weight: bold; color: #333;">${monster.title}</span>
                    </div>
                </div>
            `;

            // Add explanation
            if (monster.explanation) {
                cardHtml += `
                    <div style="font-style: italic; color: #666; margin-bottom: 8px; font-size: 12px; line-height: 1.4;">
                        ${monster.explanation}
                    </div>
                `;
            }

            // Add details
            if (monster.details && Array.isArray(monster.details)) {
                for (const detail of monster.details) {
                    const detailLabel = detail?.label ? String(detail.label).trim().toLowerCase() : '';
                    if (detailLabel.includes('alignment')) {
                        continue;
                    }

                    // Handle stats_grid specially (render as colored boxes)
                    if (detail.type === 'stats_grid' && Array.isArray(detail.content)) {
                        cardHtml += `<div style="display: grid; grid-template-columns: ${detail.content.length === 1 ? '1fr' : 'repeat(2, 1fr)'}; gap: 6px; margin: 8px 0; line-height: 1.2;">`;
                        
                        detail.content.forEach(stat => {
                            const bgColor = stat.color || '#ccc';
                            cardHtml += `
                                <div style="display: flex; flex-direction: row; align-items: center; justify-content: center; background-color: ${bgColor}; color: white; padding: 4px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; gap: 2px;">
                                    <span style="font-size: 12px;">${stat.emoji || ''}</span>
                                    <span>${stat.value}</span>
                                </div>
                            `;
                        });
                        
                        cardHtml += `</div>`;
                        continue;  // Skip to next detail
                    }
                    
                    // Handle saves_grid (ability scores) - display as a 3-column grid of ability boxes
                    if (detail.type === 'saves_grid' && Array.isArray(detail.content)) {
                        cardHtml += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 6px 0; line-height: 1.1;">`;
                        
                        detail.content.forEach(save => {
                            const bgColor = save.color || '#ccc';
                            const saveValue = typeof save.modifier === 'number'
                                ? `${save.modifier >= 0 ? '+' : ''}${save.modifier}`
                                : String(save.modifier !== undefined && save.modifier !== null ? save.modifier : save.value || '');
                            cardHtml += `
                                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: ${bgColor}; color: white; padding: 3px 4px; border-radius: 3px; font-size: 10px; font-weight: 600;">
                                    <span style="font-size: 10px; font-weight: 700; margin-bottom: 2px;">${saveValue} ${save.emoji || ''}</span>
                                    <span style="font-size: 8px; text-align: center;">${save.name || ''}</span>
                                </div>
                            `;
                        });
                        
                        cardHtml += `</div>`;
                        continue;  // Skip to next detail
                    }

                    // Handle skills_grid (skill proficiencies) - display as a 3-column grid of skill boxes
                    if (detail.type === 'skills_grid' && Array.isArray(detail.content)) {
                        cardHtml += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 6px 0; line-height: 1.1;">`;
                        
                        detail.content.forEach(skill => {
                            const bgColor = skill.color || '#ccc';
                            const skillValue = typeof skill.modifier === 'number'
                                ? `${skill.modifier >= 0 ? '+' : ''}${skill.modifier}`
                                : String(skill.modifier !== undefined && skill.modifier !== null ? skill.modifier : skill.value || '');
                            cardHtml += `
                                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: ${bgColor}; color: white; padding: 3px 4px; border-radius: 3px; font-size: 10px; font-weight: 600;">
                                    <span style="font-size: 10px; font-weight: 700; margin-bottom: 2px;">${skillValue} ${skill.emoji || ''}</span>
                                    <span style="font-size: 8px; text-align: center;">${skill.name || ''}</span>
                                </div>
                            `;
                        });
                        
                        cardHtml += `</div>`;
                        continue;  // Skip to next detail
                    }

                    let contentHtml = '';
                    
                    // Check if content is a roll object (has 'roll' property)
                    if (detail.content && typeof detail.content === 'object' && (detail.content.roll !== undefined || detail.content.numerics || detail.content.type_ids)) {
                        // This is a roll object - format it with full details
                        if (Array.isArray(detail.content)) {
                            // Multiple rolls
                            const rollStrs = detail.content.map(roll => formatRollForPopup(roll)).filter(s => s);
                            contentHtml = rollStrs.join(' or ');
                        } else {
                            // Single roll object
                            contentHtml = formatRollForPopup(detail.content);
                        }
                    } else {
                        contentHtml = formatDisplayValue(detail.content);
                    }

                    if (contentHtml && contentHtml !== 'none') {
                        // Add color for special labels
                        let labelColor = '#4a90e2';
                        if (detail.label && detail.label.includes('🎲')) {
                            labelColor = '#2471a3';  // Darker blue for attack rolls
                        } else if (detail.label && (detail.label.includes('🗡️') || detail.label.includes('🔨') || detail.label.includes('💥'))) {
                            labelColor = '#c0392b';  // Red for damage
                        }
                        const labelTitle = detail.tooltip ? ` title="${escapeHtml(detail.tooltip)}"` : '';
                        
                        cardHtml += `
                            <div style="margin: 6px 0; line-height: 1.4;">
                                <span style="font-weight: 600; color: ${labelColor};"${labelTitle}>${escapeHtml(detail.label)}</span>
                                <span style="color: #333;"> ${contentHtml}</span>
                            </div>
                        `;
                    }
                }
            }

            // Add footer
            if (monster.footer_info) {
                cardHtml += `
                    <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; font-size: 11px; color: #666; font-weight: 600;">
                        ${monster.footer_info}
                    </div>
                `;
            }

            popup.innerHTML = cardHtml;

            // Position popup near the trigger element
            document.body.appendChild(popup);
            
            const rect = triggerElement.getBoundingClientRect();
            let leftPos = rect.left;
            let topPos = rect.bottom + 8;

            // Adjust if popup goes off-screen
            if (leftPos + popup.offsetWidth > window.innerWidth) {
                leftPos = window.innerWidth - popup.offsetWidth - 10;
            }
            if (topPos + popup.offsetHeight > window.innerHeight) {
                topPos = rect.top - popup.offsetHeight - 8;
            }

            popup.style.left = Math.max(10, leftPos) + 'px';
            popup.style.top = Math.max(10, topPos) + 'px';

            // Remove popup on mouse leave
            triggerElement.addEventListener('mouseleave', function() {
                const pop = document.getElementById('monster-card-popup');
            });

            // Also remove if clicking elsewhere
            document.addEventListener('click', function removePopup(e) {
                if (e.target !== triggerElement && !popup.contains(e.target)) {
                    const pop = document.getElementById('monster-card-popup');
                    if (pop) {
                        pop.remove();
                        document.removeEventListener('click', removePopup);
                    }
                }
            });
        }

        function showNpcCardPopup(npc, triggerElement) {
            const existing = document.getElementById('npc-card-popup');
            if (existing) {
                existing.remove();
            }

            const popup = document.createElement('div');
            popup.id = 'npc-card-popup';
            popup.style.cssText = `
                position: fixed;
                z-index: 10000;
                background: white;
                border-radius: 8px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.3);
                width: auto;
                min-width: 280px;
                max-width: min(90vw, 420px);
                max-height: 500px;
                overflow-y: auto;
                padding: 12px;
                font-family: 'Nunito', sans-serif;
                pointer-events: auto;
                font-size: 13px;
            `;

            let cardHtml = `
                <div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 2px solid #4a90e2;">
                    <div style="font-size: 16px; margin-bottom: 4px;">
                        <span style="font-size: 18px; margin-right: 4px;">👤</span>
                        <span style="font-weight: bold; color: #333;">${escapeHtml(npc.name)}</span>
                    </div>
                </div>
            `;

            const meta = [];
            if (npc.race) meta.push(escapeHtml(npc.race));
            if (npc.background) meta.push(escapeHtml(npc.background));
            if (npc.size) meta.push(escapeHtml(npc.size));
            if (npc.speed) meta.push(`Speed: ${escapeHtml(npc.speed)}`);
            if (npc.armor_class != null) meta.push(`AC: ${escapeHtml(String(npc.armor_class))}`);
            if (npc.hit_points != null) meta.push(`HP: ${escapeHtml(String(npc.hit_points))}`);
            if (npc.languages) meta.push(`Lang: ${escapeHtml(npc.languages)}`);
            if (meta.length) {
                cardHtml += `
                    <div style="color: #666; margin-bottom: 8px; font-size: 12px; line-height: 1.4;">
                        ${meta.join(' · ')}
                    </div>
                `;
            }

            if (npc.explanation) {
                cardHtml += `
                    <div style="font-style: italic; color: #666; margin-bottom: 8px; font-size: 12px; line-height: 1.4;">
                        ${escapeHtml(npc.explanation)}
                    </div>
                `;
            }

            const details = [];
            if (npc.stats && typeof npc.stats === 'object' && Object.keys(npc.stats).length) {
                const scores = Object.entries(npc.stats).map(([key, value]) => `${escapeHtml(key.charAt(0).toUpperCase() + key.slice(1))}: ${escapeHtml(String(value))}`);
                details.push(`<div style="margin-bottom: 6px; font-size: 12px; color: #333;">${scores.join(' · ')}</div>`);
            }
            if (npc.saving_throws && typeof npc.saving_throws === 'object' && Object.keys(npc.saving_throws).length) {
                const saves = Object.entries(npc.saving_throws).map(([key, value]) => `${escapeHtml(labelFor(key))}: ${escapeHtml(String(value))}`);
                details.push(`<div style="margin-bottom: 6px; font-size: 12px; color: #333;"><strong>Saves:</strong> ${saves.join(', ')}</div>`);
            }
            if (npc.skills && typeof npc.skills === 'object' && Object.keys(npc.skills).length) {
                const skills = Object.entries(npc.skills).map(([key, value]) => `${escapeHtml(labelFor(key))}: ${escapeHtml(String(value))}`);
                details.push(`<div style="margin-bottom: 6px; font-size: 12px; color: #333;"><strong>Skills:</strong> ${skills.join(', ')}</div>`);
            }
            if (npc.appearance && typeof npc.appearance === 'object' && Object.keys(npc.appearance).length) {
                const appearance = Object.entries(npc.appearance).map(([key, value]) => `${escapeHtml(labelFor(key))}: ${escapeHtml(String(value))}`);
                details.push(`<div style="margin-bottom: 6px; font-size: 12px; color: #333;"><strong>Appearance:</strong> ${appearance.join(', ')}</div>`);
            }
            if (npc.notes) {
                details.push(`<div style="margin-top: 6px; font-size: 12px; color: #333; line-height: 1.4;"><strong>Notes:</strong> ${escapeHtml(npc.notes)}</div>`);
            }
            if (details.length) {
                cardHtml += details.join('');
            }

            popup.innerHTML = cardHtml;
            document.body.appendChild(popup);

            const rect = triggerElement.getBoundingClientRect();
            let leftPos = rect.left;
            let topPos = rect.bottom + 8;
            if (leftPos + popup.offsetWidth > window.innerWidth) {
                leftPos = window.innerWidth - popup.offsetWidth - 10;
            }
            if (topPos + popup.offsetHeight > window.innerHeight) {
                topPos = rect.top - popup.offsetHeight - 8;
            }
            popup.style.left = Math.max(10, leftPos) + 'px';
            popup.style.top = Math.max(10, topPos) + 'px';

            document.addEventListener('click', function removePopup(e) {
                if (e.target !== triggerElement && !popup.contains(e.target)) {
                    const pop = document.getElementById('npc-card-popup');
                    if (pop) {
                        pop.remove();
                        document.removeEventListener('click', removePopup);
                    }
                }
            });
        }

        // Format a single roll object for popup display (matching monster card style)
        function formatRollForPopup(rollObj) {
            if (!rollObj || typeof rollObj !== 'object') return '';
            
            if (!rollObj.roll) return '';
            
            // Start with roll notation
            let rollPart = rollObj.roll;
            if (rollObj.mod !== null && rollObj.mod !== undefined && rollObj.mod !== 0) {
                const sign = rollObj.mod > 0 ? '+' : '';
                rollPart = `${rollObj.roll} ${sign}${rollObj.mod}`;
            }
            
            let parts = [rollPart];
            
            // Add numeric modifiers with emojis
            if (rollObj.numerics && Array.isArray(rollObj.numerics) && rollObj.numerics.length > 0) {
                parts.push(...rollObj.numerics.map(ability => {
                    if (typeof ability === 'object' && ability.emoji && ability.name) {
                        return `${ability.emoji} ${ability.name}`;
                    } else if (typeof ability === 'object' && ability.name) {
                        return ability.name;
                    }
                    return String(ability);
                }));
            }
            
            // Build descriptor string with damage types
            const descriptors = [];
            
            // Add damage types with emojis
            if (rollObj.type_ids && Array.isArray(rollObj.type_ids) && rollObj.type_ids.length > 0) {
                const typeDisplays = rollObj.type_ids.map(type => {
                    if (typeof type === 'object' && type.emoji && type.name) {
                        return `${type.emoji} ${type.name}`;
                    } else if (typeof type === 'object' && type.name) {
                        return type.name;
                    }
                    return String(type);
                });
                descriptors.push(typeDisplays.join(', '));
            }
            
            // Add shape/AOE if present
            if (rollObj.shape) {
                descriptors.push(rollObj.shape);
            }
            
            // Combine
            let result = parts.join(' + ');
            
            // Add descriptors in parentheses
            if (descriptors.length > 0) {
                result += ` (${descriptors.join(', ')})`;
            }
            
            return result.trim();
        }

        async function enrichTrapDisplay() {
            // Build a map of trap IDs to names for caching
            const trapCache = {};
            
            const trapElements = document.querySelectorAll('[data-trap-ids]');
            
            for (const element of trapElements) {
                const trapIdsStr = element.getAttribute('data-trap-ids');
                if (!trapIdsStr) continue;
                
                const trapIds = trapIdsStr.split(',').map(id => parseInt(id.trim())).filter(id => !isNaN(id));
                if (trapIds.length === 0) continue;
                
                // Fetch trap names from cache or API
                const trapNames = [];
                for (const trapId of trapIds) {
                    if (trapCache[trapId]) {
                        trapNames.push(trapCache[trapId]);
                    } else {
                        try {
                            const response = await fetch(`/api/traps/${trapId}`);
                            if (response.ok) {
                                const trap = await response.json();
                                trapCache[trapId] = trap.name;
                                trapNames.push(trap.name);
                            }
                        } catch (error) {
                            console.error(`Failed to fetch trap ${trapId}:`, error);
                        }
                    }
                }
                
                // Update the display with trap names
                if (trapNames.length > 0) {
                    element.textContent = `⚠️ ${trapNames.join(', ')}`;
                }
            }
        }

            // Section 3: Room Details

            const roomEntries = Array.isArray(room.entries) ? room.entries : [];
            const relevantDoorEntries = (data.doors || []).filter(door => {

                if (Array.isArray(door.leads_to)) {
                    return door.leads_to.some(id => Number(id) === Number(displayRoomId));
                }
                return Number(door.leads_to) === Number(displayRoomId);

            const relevantStairEntries = (data.stairs || []).filter(stair => {

                return Array.isArray(stair.leads_to_rooms) && stair.leads_to_rooms.some(id => Number(id) === Number(displayRoomId));
            });

            const roomDoorIds = roomEntries
                .filter(entry => entry.entry_type === 'door' && entry.door_id != null)
                .map(entry => String(entry.door_id));

            const uniqueRelevantDoors = relevantDoorEntries.filter(door => !roomDoorIds.includes(String(door.door_id)));
            const nonDoorRoomEntries = roomEntries.filter(entry => entry.entry_type !== 'door');

            // Group entries by type
            const grouped = {
                door: [],
                stairs: [],
                monster: [],
                npc: [],
                feature: [],

                treasure: [],
                trick: [],

            nonDoorRoomEntries.forEach(entry => {

            // Add NPCs from the room-level NPC list

            const existingNpcNames = new Set(roomEntries
                .filter(entry => entry.entry_type === 'npc' && entry.npc_name)
                .map(entry => String(entry.npc_name))
            );
            roomNpcs.forEach(npcName => {
                const normalizedName = String(npcName);
                if (!existingNpcNames.has(normalizedName)) {
                    grouped.npc.push({
                        entry_type: 'npc',
                        npc_name: normalizedName,
                        title: normalizedName
                    });
                }
            });

            // Add top-level doors/stairs for this room
            grouped.door.push(...uniqueRelevantDoors);
            grouped.stairs.push(...relevantStairEntries);

            // Display grouped entries
            const typeLabels = {

                        <div class="error-message">
                            Error: ${escapeHtml(result.error || 'Unable to create blank dungeon')}
                        </div>
                    `;
                }
            })
            .catch(err => {
                statusDiv.innerHTML = `
                    <div class="error-message">
                        Error: ${escapeHtml(err.message)}
                    </div>
                `;
            });
        }

        function normalizeRoomTitle(title) {
            return String(title || '').trim().toLowerCase();
        }

        function isRoomTitleTaken(title) {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const normalized = normalizeRoomTitle(title);
            return rooms.some(room => normalizeRoomTitle(room.title) === normalized);
        }

        function getRoomDisplayName(room, fallbackIdx = null) {
            if (!room) return '';
            const roomId = room.room_id != null ? room.room_id : fallbackIdx;
            const title = String(room.title || '').trim();
            return title ? `${title} (Room ${roomId})` : `Room ${roomId}`;
        }

        function getNextDoorId() {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const doors = data?.doors || [];
            let maxId = 0;
            rooms.forEach(room => {
                if (!room.entries) return;
                room.entries.forEach(entry => {
                    if (entry.entry_type === 'door' && entry.door_id != null) {
                        const numeric = parseInt(entry.door_id, 10);
                        if (!Number.isNaN(numeric)) {
                            maxId = Math.max(maxId, numeric);
                        }
                    }
                });
            });
            doors.forEach(door => {
                if (door.entry_type === 'door' && door.door_id != null) {
                    const numeric = parseInt(door.door_id, 10);
                    if (!Number.isNaN(numeric)) {
                        maxId = Math.max(maxId, numeric);
                    }
                }
            });
            return maxId + 1;
        }

        function getNextStairId() {
            const data = currentDungeon?.parsed_json;
            const stairs = data?.stairs || [];
            let maxId = 0;
            stairs.forEach(stair => {
                if (stair.entry_type === 'stairs' && stair.stair_id != null) {
                    const numeric = parseInt(stair.stair_id, 10);
                    if (!Number.isNaN(numeric)) {
                        maxId = Math.max(maxId, numeric);
                    }
                }
            });
            return maxId + 1;
        }

        function ensureDoorIdsAssigned() {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            const doors = data?.doors || [];
            let nextId = getNextDoorId();
            let changed = false;
            rooms.forEach(room => {
                if (!room.entries) return;
                room.entries.forEach(entry => {
                    if (entry.entry_type === 'door' && entry.door_id == null) {
                        entry.door_id = nextId++;
                        changed = true;
                    }
                });
            });
            doors.forEach(door => {
                if (door.entry_type === 'door' && door.door_id == null) {
                    door.door_id = nextId++;
                    changed = true;
                }
            });
            return changed;
        }

        function getDoorDisplayName(entry) {
            if (!entry) return '';
            const doorId = entry.door_id != null ? entry.door_id : getNextDoorId();
            const title = String(entry.title || '').trim();
            return title ? `${title} (Door ${doorId})` : `Door ${doorId}`;
        }

        function formatTargetLinks(targets, currentRoomId) {
            if (!targets) return '';
            const ids = Array.isArray(targets) ? targets : [targets];
            const targetLabels = ids
                .map(id => {
                    const numericId = parseInt(id, 10);
                    if (Number.isNaN(numericId) || numericId === Number(currentRoomId)) return null;
                    const room = getRoomById(numericId);
                    const label = room ? getRoomDisplayName(room) : `Room ${numericId}`;
                    return `<a href="#" onclick="goToRoom('${escapeJsString(String(numericId))}'); return false;" class="room-link">${escapeHtml(label)}</a>`;
                })
                .filter(Boolean);
            return targetLabels.join(', ');
        }

        function formatFloorLabels(floorIds) {
            if (!floorIds) return '';
            const ids = Array.isArray(floorIds) ? floorIds : [floorIds];
            const labels = ids
                .map(id => {
                    const numericId = parseInt(id, 10);
                    if (Number.isNaN(numericId)) return null;
                    const floor = getFloorById(numericId);
                    return floor ? escapeHtml(floor.title || `Floor ${floor.floor_id}`) : `Floor ${numericId}`;
                })
                .filter(Boolean);
            return labels.join(', ');
        }

        function formatEntryLeadsToDisplay(entry, currentRoomId) {
            if (!entry) return '';
            const parts = [];
            if (entry.leads_to != null) {
                const roomLinks = formatTargetLinks(entry.leads_to, currentRoomId);
                if (roomLinks) parts.push(roomLinks);
            }
            if (entry.leads_to_rooms && entry.leads_to_rooms.length) {
                const roomLinks = formatTargetLinks(entry.leads_to_rooms, currentRoomId);
                if (roomLinks) parts.push(roomLinks);
            }
            if (entry.leads_to_floors && entry.leads_to_floors.length) {
                const floorLabels = formatFloorLabels(entry.leads_to_floors);
                if (floorLabels) parts.push(`Floors: ${floorLabels}`);
            }
            return parts.join(' | ');
        }

        function getFloorById(floorId) {
            const data = currentDungeon?.parsed_json;
            const floors = data?.floors || [];
            const numericId = parseInt(floorId, 10);
            if (Number.isNaN(numericId)) return null;
            return floors.find(floor => Number(floor.floor_id) === numericId) || null;
        }

        function getRoomTargets(currentRoomIdx = null) {
            const data = currentDungeon?.parsed_json;
            const rooms = data?.rooms || [];
            return rooms
                .map((room, idx) => ({
                    title: String(room.title || '').trim(),
                    room_id: room.room_id != null ? room.room_id : idx,
                    displayName: getRoomDisplayName(room, idx)
                }))
                .filter((room, idx) => idx !== currentRoomIdx && room.title.length > 0);
        }

        function loadRoomTargets(currentRoomIdx = null, selectedValue = '') {
            const select = document.getElementById('featureLeadsTo');
            select.innerHTML = '';

            const targets = getRoomTargets(currentRoomIdx);
            select.appendChild(new Option('Select a room...', '', true, false));

            targets.forEach(room => {
                const option = new Option(room.displayName, room.room_id, false, String(room.room_id) === String(selectedValue));
                select.appendChild(option);
            });

            select.appendChild(new Option('Create new room...', '__create_new_room__', false, false));

            if (selectedValue && !targets.some(room => String(room.room_id) === String(selectedValue))) {
                const custom = new Option(selectedValue, selectedValue, true, true);
                select.insertBefore(custom, select.children[1] || select.firstChild);
            }
        }

        function loadFloorOptions(selectedValues = []) {
            const data = currentDungeon?.parsed_json;
            const floors = data?.floors || [];
            const selectRooms = document.getElementById('stairsRooms');
            const selectFloors = document.getElementById('stairsFloors');
            if (!selectRooms || !selectFloors) return;

            const selectedStrings = Array.isArray(selectedValues) ? selectedValues.map(String) : [];
            selectRooms.innerHTML = '';
            selectFloors.innerHTML = '';

            const roomTargets = getRoomTargets(currentRoomIdx);
            roomTargets.forEach(room => {
                const option = document.createElement('option');

                option.text = room.displayName;
                option.selected = selectedStrings.includes(String(room.room_id));
                selectRooms.appendChild(option);

            floors.forEach(floor => {
                const label = `${escapeHtml(floor.title || `Floor ${floor.floor_id}`)} (ID ${floor.floor_id})`;
                floorOptions.push(`<option value="${floor.floor_id}">${label}</option>`);
            });
            selectFloors.innerHTML = floorOptions.join('');

            if (selectedStrings.length > 0) {
                Array.from(selectFloors.options).forEach(option => {
