<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NPC Editor — D&D Kids Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/page-layout.css">
  
</head>
<body>
  <header class="site-header">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
      <div>
        <h1>🧑‍🎤 NPC Editor</h1>
        <p>Browse NPCs, edit details, and add new characters in a kid-friendly interface.</p>
      </div>
    </div>
  </header>

  <div id="page-pane-layout" class="dungeon-viewer-layout active">
  <!-- The sidebar toggle button is now included for accessibility and responsive navigation -->
  <!-- Left panel: search + NPC list -->
  <div id="viewer-sidebar" class="map-panel">
    <div id="resizeHandle" class="resize-handle" aria-label="Resize sidebar" tabindex="0" role="separator" aria-orientation="vertical"></div>
    <button id="showListPanelBtn" class="toggle-list-btn hidden" onclick="expandListPanel()" aria-label="Expand NPC list sidebar" tabindex="0">→</button>
    <label class="search-field" for="search-input">
      <span>Search NPCs</span>
      <input id="search-input" type="search" placeholder="Type an NPC name..." autocomplete="off" aria-label="Search NPCs" />
    </label>
    <div class="monster-book-meta">NPCs</div>
    <div id="npc-count" class="monster-book-meta" aria-live="polite">Loading...</div>
    <div id="npc-list" class="monster-list" aria-live="polite"></div>
  </div>

  <!-- Right panel: controls bar + scrollable detail -->
  <div class="dungeon-viewer-right">
    <div class="viewer-controls controls-row" aria-label="NPC controls" role="toolbar">
      <a href="resources.html" class="back-btn">← Resources</a>
      <span id="npc-title-header" class="monster-title-header">Select or create an NPC</span>
      <button id="new-npc-btn" class="back-btn" style="background: #4a90e2; margin-left: 0.5rem;" aria-label="Add new NPC">+ New NPC</button>
      <button id="export-npcs-btn" class="back-btn" style="background: #7f8c8d; margin-left: 0.5rem;" aria-label="Export NPCs as JSON">Export JSON</button>
    </div>
    <div class="dungeon-content">
      <div id="npc-detail-shell" class="monster-detail-shell">
        <div class="placeholder" role="status" aria-live="polite">Search, select, or create an NPC to view or edit details.</div>
      </div>
    </div>
  </div>
</div>

  <script src="../js/dom-utils.js"></script>
<script src="../js/data-utils.js"></script>
<script src="../js/pane-resize.js"></script>
<script src="../js/page-base.js"></script>
<script>
  PageBase.autoInitializeViewerPane('npcEditor', {
    defaultWidth: 350,
    maxWidthFraction: 0.6,
    collapseThreshold: 200,
    showBtnId: 'showListPanelBtn',
    layoutId: 'page-pane-layout',
    panelId: 'viewer-sidebar',
    handleId: 'resizeHandle'
  });
</script>
<script src="../js/api.js"></script>
<script src="../js/npc-editor.js"></script>
</body>
</html>
