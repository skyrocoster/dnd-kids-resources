<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank Creature Cards - D&D Kids Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment: #fdf3e3;
      --ink: #2c1810;
      --silver: #c0c0c0;
      --muted: #8b5e3c;
      --wb: #fffef7;
      --border: #8b5e3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #c9a97a;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: var(--parchment);
      padding: 8mm;
      position: relative;
    }

    .page-header {
      text-align: center;
      margin-bottom: 5mm;
      padding-top: 2mm;
    }
    .page-header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 22pt;
      color: #c0392b;
      text-shadow: 2px 2px 0 #f5cba7, 3px 3px 0 var(--border);
      line-height: 1;
    }
    .page-header p {
      font-size: 7pt;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 1mm;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 63.5mm);
      grid-auto-rows: 88.9mm;
      gap: 3mm;
      justify-content: center;
    }

    .card {
      border-radius: 10px;
      border: 3px solid var(--border);
      background: var(--wb);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .card-header {
      padding: 2.5mm 3mm 2mm;
      background: var(--silver);
      display: flex;
      align-items: center;
      gap: 2mm;
      flex-shrink: 0;
    }
    .card-icon {
      font-size: 20pt;
      line-height: 1;
      flex-shrink: 0;
    }
    .card-title {
      font-family: 'Fredoka One', cursive;
      font-size: 10pt;
      font-weight: 800;
      line-height: 1.1;
      flex: 1;
    }

    .card-body {
      flex: 1;
      padding: 2mm 2.5mm;
      font-size: 7pt;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 2mm;
    }

    .card-body-blank {
      flex: 1;
      background: linear-gradient(to bottom, transparent 0%, transparent calc(100% - 2px), #ddd 100%);
      background-size: 100% 14px;
      background-position: 0 2mm;
    }

    @media print {
      body { background: white; }
      .page { margin: 0; break-after: always; }
      .page:last-child { break-after: auto; }
      .card { -webkit-print-color-adjust: exact; print-color-adjust: exact; break-inside: avoid; }
      .card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .card-body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      @page { margin: 0; size: A4; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>🐺 Wild Shapes 🦅</h1>
      <p>Blank cards for custom shapes</p>
    </div>

    <div class="cards-grid">
      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">_</div>
          <div class="card-title">Your Form Here</div>
        </div>
        <div class="card-body">
          <div class="card-body-blank"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/bw-mode-toggle.js"></script>
</body>
</html>
