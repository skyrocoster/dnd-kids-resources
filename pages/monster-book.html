<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Monster Lookup — D&D Kids Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/page-layout.css">

</head>
<body>
  <header class="site-header">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
      <div>
        <h1>👾 Monster Lookup</h1>
        <p>Browse and inspect D&amp;D monsters</p>
      </div>
    </div>
  </header>

  <div id="viewerView" class="dungeon-viewer-layout active">

    <!-- Left panel: search + monster list -->
    <div id="mapPanel" class="map-panel">
      <div id="resizeHandle" class="resize-handle"></div>
      <label class="search-field">
        <span>Search monsters</span>
        <input id="search-input" type="search" placeholder="Type a monster name..." autocomplete="off">
      </label>
      <div id="monster-count" class="monster-book-meta">Loading monsters…</div>
      <div id="monster-list" class="monster-list"></div>
    </div>

    <!-- Right panel: controls bar + scrollable detail -->
    <div class="dungeon-viewer-right">
      <div class="viewer-controls controls-row">
        <button id="showListPanelBtn" class="toggle-list-btn hidden" onclick="expandListPanel()">→</button>
        <a href="resources.html" class="back-btn">← Resources</a>
        <span id="monster-title-header" class="monster-title-header">Select a monster</span>
      </div>
      <div class="dungeon-content">
        <div id="monster-detail-shell" class="monster-detail-shell">
          <div class="monster-detail-placeholder">Search or select a monster to view its full details.</div>
        </div>
      </div>
    </div>

  </div>

  <script src="../js/api.js"></script>
  <script src="../js/dom-utils.js"></script>
  <script src="../js/data-utils.js"></script>
  <script src="../js/page-base.js"></script>
  <script src="../js/pane-resize.js"></script>
  <script>
    PageBase.autoInitializeViewerPane('monster', {
      defaultWidth: 350,
      maxWidthFraction: 0.6,
      collapseThreshold: 200
    });
  </script>
  <script src="../js/monster-book.js"></script>
</body>
</html>
