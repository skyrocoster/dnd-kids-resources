<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Cards List View - D&D Kids Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      background: #c9a97a;
      margin: 0;
      min-height: 100vh;
    }
    .page-container-shell {
      width: 100%;
      max-width: 220mm;
      margin: 0 auto;
      padding: 10px;
    }
    .notes-bar {
      background: #fdf3e3;
      border: 2px solid #8b5e3c;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 14px;
      color: #2c1810;
      font-size: 13px;
      line-height: 1.6;
    }

    #print-options {
      background: #f0e8d8;
      border: 2px solid #8b5e3c;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 16px;
    }

    .print-options-title {
      font-weight: 700;
      margin-bottom: 12px;
      color: #2c1810;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .print-options-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .print-option {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .print-option label {
      font-weight: 600;
      color: #2c1810;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .print-option select {
      padding: 8px 10px;
      border: 2px solid #8b5e3c;
      background: white;
      color: #2c1810;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      font-family: 'Nunito', sans-serif;
    }

    .print-option select:hover {
      border-color: #6b4423;
    }

    .print-option select:focus {
      outline: none;
      border-color: #c0392b;
      box-shadow: 0 0 4px rgba(192, 57, 43, 0.3);
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .level-btn {
      padding: 8px 12px;
      border: 2px solid #8b5e3c;
      background: white;
      color: #2c1810;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .level-btn:hover {
      background: #e8dcc8;
      transform: translateY(-1px);
    }

    .level-btn.active {
      background: #c0392b;
      color: white;
      border-color: #a93226;
    }

    .edit-mode-toggle {
      padding: 8px 12px;
      border: 2px solid #8b5e3c;
      background: white;
      color: #2c1810;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      font-family: 'Nunito', sans-serif;
      width: fit-content;
    }

    .edit-mode-toggle.active {
      background: #2e8b57;
      color: white;
      border-color: #256d45;
    }

    .spell-edit-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 5;
      padding: 5px 9px;
      border: 1px solid #8b5e3c;
      background: rgba(255, 255, 255, 0.96);
      color: #2c1810;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
    }

    .spell-edit-btn:hover {
      background: #fff7ec;
    }

    .spell-edit-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(32, 20, 12, 0.6);
      padding: 16px;
      z-index: 1000;
    }

    .spell-edit-modal.visible {
      display: flex;
    }

    .spell-edit-dialog {
      width: min(980px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #fff8ec;
      border: 3px solid #8b5e3c;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }

    .spell-edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .spell-edit-header h2 {
      margin: 0;
      color: #2c1810;
      font-size: 22px;
    }

    .spell-edit-close {
      border: none;
      background: transparent;
      color: #6b4423;
      cursor: pointer;
      font-size: 26px;
      line-height: 1;
    }

    .spell-edit-status {
      min-height: 20px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #8b5e3c;
    }

    .spell-edit-status.error {
      color: #b22222;
    }

    .spell-edit-status.success {
      color: #2e8b57;
    }

    .spell-edit-fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px 14px;
    }

    .spell-edit-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .spell-edit-field.full-width {
      grid-column: 1 / -1;
    }

    .spell-edit-field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #2c1810;
    }

    .spell-edit-field input,
    .spell-edit-field textarea {
      border: 2px solid #b0865a;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      color: #2c1810;
      background: white;
    }

    .spell-edit-field textarea {
      resize: vertical;
      min-height: 88px;
      font-family: Consolas, 'Courier New', monospace;
    }

    .spell-edit-section {
      grid-column: 1 / -1;
      border: 2px solid #d8c3a5;
      border-radius: 10px;
      background: #fffdf7;
      padding: 12px;
    }

    .spell-edit-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .spell-edit-section-title {
      margin: 0;
      color: #2c1810;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .spell-edit-section-note {
      margin: 0 0 10px;
      color: #6b4423;
      font-size: 12px;
      line-height: 1.4;
    }

    .spell-edit-section-add {
      padding: 7px 10px;
      border: none;
      border-radius: 7px;
      background: #8b5e3c;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
    }

    .spell-edit-row-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .spell-edit-row-card {
      border: 1px solid #d8c3a5;
      border-radius: 8px;
      background: white;
      padding: 10px;
    }

    .spell-edit-row-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .spell-edit-subfield {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .spell-edit-subfield label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #5a3922;
    }

    .spell-edit-subfield input {
      border: 1px solid #b0865a;
      border-radius: 6px;
      padding: 7px 8px;
      font-size: 12px;
      font-family: 'Nunito', sans-serif;
      color: #2c1810;
    }

    .spell-edit-row-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .spell-edit-row-remove {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #c0392b;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
    }

    .spell-edit-inline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .spell-edit-empty {
      color: #7b6a58;
      font-size: 12px;
      font-style: italic;
    }

    .spell-edit-checkbox {
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding-top: 20px;
    }

    .spell-edit-checkbox input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .spell-edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .spell-edit-actions button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
    }

    .spell-edit-cancel {
      background: #d6c4aa;
      color: #2c1810;
    }

    .spell-edit-save {
      background: #2e8b57;
      color: white;
    }

    @media (max-width: 700px) {
      .spell-edit-fields {
        grid-template-columns: 1fr;
      }
    }
    .notes-bar strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    @page {
      margin: 12mm;
      size: A4;
    }

    @media print {
      body {
        background: white;
      }
      .notes-bar {
        display: none;
      }
      .page-list {
        padding-top: 18mm;
      }
    }
  </style>
</head>
<body>
  <div class="page-container-shell">
    <div class="notes-bar">
      <strong>List-style test page</strong>
      Cards are rendered in a flexible vertical list with a wide A4-friendly width.
    </div>
    <div id="print-options">
      <div class="print-options-title">Print Options</div>
      <div class="print-options-group">
        <div class="print-option">
          <label for="range-display-mode">Range Display</label>
          <select id="range-display-mode">
            <option value="standard">Standard</option>
            <option value="simple">Simple</option>
          </select>
        </div>
        <div class="print-option">
          <label>Spell Editing</label>
          <button id="spell-edit-mode-btn" class="edit-mode-toggle" type="button">✎ Edit Mode OFF</button>
        </div>
      </div>
    </div>
    <div id="page-container"></div>
  </div>

  <div id="spell-edit-modal" class="spell-edit-modal" aria-hidden="true">
    <div class="spell-edit-dialog">
      <div class="spell-edit-header">
        <h2 id="spell-edit-title">Edit Spell</h2>
        <button id="spell-edit-close" class="spell-edit-close" type="button" aria-label="Close spell editor">×</button>
      </div>
      <div id="spell-edit-status" class="spell-edit-status"></div>
      <form id="spell-edit-form">
        <div id="spell-edit-fields" class="spell-edit-fields"></div>
        <div class="spell-edit-actions">
          <button type="button" id="spell-edit-cancel" class="spell-edit-cancel">Cancel</button>
          <button type="submit" id="spell-edit-save" class="spell-edit-save">Save Spell</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/card-generator.js"></script>
  <script src="../js/spells-list.js"></script>
</body>
</html>
