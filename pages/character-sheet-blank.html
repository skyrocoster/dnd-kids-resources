<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blank Character Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swim" rel="stylesheet">
<style>
  :root {
    --parchment: #fdf3e3;
    --ink: #2c1810;
    --red: #c0392b;
    --blue: #2471a3;
    --green: #1e8449;
    --gold: #c9a90a;
    --purple: #7d3c98;
    --orange: #ca6f1e;
    --border: #8b5e3c;
    --wb: #fffef7;
    --wbl: #b0865a;
    --muted: #8b5e3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #c9a97a; font-family: 'Nunito', sans-serif; color: var(--ink); }

  .sheet {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    background: var(--parchment);
    padding: 8mm;
    position: relative;
    overflow: hidden;
  }

  .sheet h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 28pt;
    color: var(--red);
    text-align: center;
    margin-bottom: 8mm;
    text-shadow: 2px 2px 0 #f5cba7, 3px 3px 0 var(--border);
  }

  .blank-line {
    border-bottom: 2px solid var(--border);
    height: 8mm;
    margin-bottom: 5mm;
    display: flex;
    align-items: flex-end;
    padding-left: 2mm;
    font-size: 10pt;
    color: var(--muted);
  }

  .section {
    margin-bottom: 10mm;
  }

  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 14pt;
    color: var(--blue);
    border-bottom: 2px solid var(--blue);
    padding-bottom: 1mm;
    margin-bottom: 4mm;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-gap: 5mm;
    margin-bottom: 5mm;
  }

  .grid.three {
    grid-template-columns: 1fr 1fr 1fr;
  }

  @media print {
    body { background: none; }
    .sheet { margin: 0; padding: 8mm; box-shadow: none; }
  }
</style>
</head>
<body>
  <div class="sheet">
    <h1>⚔️ My Character ⚔️</h1>
    
    <div class="blank-line">Character Name: ___________________</div>
    <div class="grid three">
      <div class="blank-line">Class: ___________</div>
      <div class="blank-line">Level: ___</div>
      <div class="blank-line">Race: ___________</div>
    </div>

    <div class="section">
      <div class="section-title">Abilities</div>
      <div class="grid three">
        <div class="blank-line">STR: ___</div>
        <div class="blank-line">DEX: ___</div>
        <div class="blank-line">CON: ___</div>
      </div>
      <div class="grid three">
        <div class="blank-line">INT: ___</div>
        <div class="blank-line">WIS: ___</div>
        <div class="blank-line">CHA: ___</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Combat</div>
      <div class="grid">
        <div class="blank-line">AC: ___</div>
        <div class="blank-line">Hit Points: ___</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Skills & Notes</div>
      <div class="blank-line" style="height: 45mm;"></div>
    </div>
  </div>
</body>
</html>
