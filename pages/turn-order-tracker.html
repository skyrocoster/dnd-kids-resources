<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Turn Order Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&family=OpenDyslexic&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #fdf3e3;
    --ink: #2c1810;
    --red: #c0392b;
    --blue: #2471a3;
    --green: #1e8449;
    --gold: #c9a90a;
    --purple: #7d3c98;
    --orange: #ca6f1e;
    --border: #8b5e3c;
    --wb: #fffef7;
    --wbl: #b0865a;
    --muted: #8b5e3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #c9a97a;
    font-family: 'OpenDyslexic', 'Nunito', sans-serif;
    color: var(--ink);
  }

  .page {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    background: var(--parchment);
    padding: 8mm;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .page-header {
    text-align: center;
    margin-bottom: 2mm;
    padding-top: 0.5mm;
  }

  .page-header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 28pt;
    color: var(--red);
    text-shadow: 2px 2px 0 #f5cba7, 3px 3px 0 var(--border);
    line-height: 1;
  }

  .page-header p {
    font-size: 8pt;
    color: var(--muted);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 0.3mm;
  }

  /* ── Main Content ── */
  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 3mm 5mm;
  }

  /* ── Section Header ── */
  .section-label {
    font-size: 12pt;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    display: block;
    margin-bottom: 2mm;
    padding-bottom: 1.5mm;
    border-bottom: 2px solid var(--border);
  }

  /* ── Table ── */
  .tracker-table {
    flex: 1;
    border-collapse: collapse;
    border: 2px solid var(--border);
  }

  .tracker-table thead {
    background: var(--blue);
    border-bottom: 2px solid var(--border);
  }

  .tracker-table th {
    padding: 0.8mm 2mm;
    text-align: center;
    font-size: 9pt;
    font-weight: 800;
    color: white;
    border-right: 2px solid var(--wbl);
    height: 5mm;
    vertical-align: middle;
  }

  .tracker-table th:last-child {
    border-right: none;
  }

  .tracker-table th.turn-marker {
    width: 22mm;
    text-align: center;
  }

  .tracker-table th.character-name {
    flex: 1;
  }

  .tracker-table th.initiative {
    width: 22mm;
    text-align: center;
  }

  .tracker-table tbody tr {
    border-bottom: 2px solid var(--wbl);
    height: 12mm;
  }

  .tracker-table tbody tr:last-child {
    border-bottom: none;
  }

  .tracker-table td {
    padding: 1mm 3mm;
    font-size: 11pt;
    border-right: 2px solid var(--wbl);
    vertical-align: middle;
  }

  .tracker-table td:last-child {
    border-right: none;
  }

  .tracker-table td.turn-marker {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 14pt;
    color: var(--red);
    font-weight: 800;
    background: #e8f0f8;
    width: 22mm;
    position: relative;
  }

  .tracker-table td.turn-marker::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 18mm;
    height: 18mm;
    border: 2px solid var(--red);
    border-radius: 50%;
    pointer-events: none;
  }

  .tracker-table td.character-name {
    width: auto;
    background: white;
    text-align: left;
  }

  .tracker-table td.initiative {
    text-align: center;
    width: 18mm;
    height: 18mm;
    background: white;
    position: relative;
  }

  .tracker-table td.initiative::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 14mm;
    height: 14mm;
    border: 2px solid var(--blue);
    pointer-events: none;
  }

  /* ── Print Styles ── */
  @media print {
    body {
      background: var(--parchment);
      margin: 0;
      padding: 0;
    }

    .page {
      margin: 0;
      padding: 8mm;
      width: 210mm;
      height: 297mm;
      box-shadow: none;
      background: var(--parchment);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .page::before {
      border-color: var(--border);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .page::after {
      border-color: #c4a47a;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .page-header h1 {
      color: var(--red);
      text-shadow: 2px 2px 0 #f5cba7, 3px 3px 0 var(--border);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .section-label {
      border-bottom-color: var(--border);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table {
      border-color: var(--border);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table thead {
      background: var(--blue);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table th {
      color: white;
      background: var(--blue);
      border-color: var(--wbl);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table tr {
      border-color: var(--wbl);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table td {
      border-color: var(--wbl);
      background: white;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table td.turn-marker {
      background: #e8f0f8;
      color: var(--red);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table td.turn-marker::after {
      border-color: var(--red);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .tracker-table td.initiative::after {
      border-color: var(--blue);
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    @page {
      margin: 0;
      size: A4;
      background: var(--parchment);
    }
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Add keyboard shortcut for printing (Ctrl+P or Cmd+P)
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        window.print();
      }
    });
  });
</script>
</head>
<body>
<div class="page">
  <div class="page-header">
    <h1>⚔️ Turn Order Tracker</h1>
    <p>Combat Initiative & Round Tracking</p>
  </div>

  <div class="content">
    <span class="section-label">⚡ Initiative Order</span>

    <table class="tracker-table">
      <thead>
        <tr>
          <th class="turn-marker">Turn</th>
          <th class="character-name">Character Name</th>
          <th class="initiative">Initiative</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="turn-marker">1</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">2</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">3</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">4</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">5</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">6</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">7</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">8</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">9</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
        <tr>
          <td class="turn-marker">10</td>
          <td class="character-name"></td>
          <td class="initiative"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
