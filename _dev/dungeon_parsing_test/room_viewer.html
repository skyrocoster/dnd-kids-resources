<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Room Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background: #1a1a1a;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #8b0000;
            margin-bottom: 20px;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
        }

        h2 {
            color: #333;
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-left: 4px solid #8b0000;
            padding-left: 10px;
        }

        .entry {
            margin: 12px 0;
            padding: 12px;
            background: #f5f5f5;
            border-left: 4px solid #ccc;
            border-radius: 4px;
        }

        .entry-type {
            display: inline-block;
            background: #8b0000;
            color: white;
            padding: 4px 10px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.85em;
            margin-right: 10px;
            text-transform: uppercase;
        }

        .entry-title {
            font-weight: bold;
            color: #222;
        }

        .entry-content {
            margin-top: 8px;
            color: #444;
            font-style: italic;
        }

        .map-image {
            margin: 30px 0;
            text-align: center;
        }

        .map-image img {
            max-width: 100%;
            height: auto;
            border: 2px solid #8b0000;
            border-radius: 4px;
        }

        .loading {
            text-align: center;
            color: #666;
            font-size: 1.1em;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #c00;
        }

        .dungeon-info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .dungeon-info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <div class="loading">Loading dungeon data...</div>
        </div>
    </div>

    <script>
        let dungeonData = null;
        
        async function loadDungeonData() {
            try {
                const response = await fetch('The Secret Catacombs of Mepha 01_output.json');
                if (!response.ok) throw new Error('Failed to load JSON file');
                dungeonData = await response.json();
                
                // Display room 1 by default
                displayRoom(0);
                
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">Error loading data: ${error.message}</div>`;
                console.error('Error:', error);
            }
        }
        
        function displayRoom(roomIndex) {
            if (!dungeonData || roomIndex < 0 || roomIndex >= dungeonData.rooms.length) {
                document.getElementById('content').innerHTML = 
                    '<div class="error">Room not found</div>';
                return;
            }
            
            const dungeon = dungeonData;
            const room = dungeon.rooms[roomIndex];
            
            let html = `<h1>${dungeon.general_info.title}</h1>`;
            
            // Map image (show for all rooms)
            if (dungeon.map_image) {
                html += `
                    <div class="map-image">
                        <h2>Map</h2>
                        <img src="${dungeon.map_image}" alt="Dungeon Map">
                    </div>
                `;
            }
            
            // Room selector
            html += `<div style="margin-bottom: 20px;">
                <label for="room-select">Select Room: </label>
                <select id="room-select" onchange="displayRoom(this.value - 1)" style="padding: 5px; font-size: 1em;">`;
            
            for (let i = 0; i < dungeon.rooms.length; i++) {
                const selected = i === roomIndex ? 'selected' : '';
                html += `<option value="${i + 1}" ${selected}>Room #${i + 1}</option>`;
            }
            
            html += `</select></div>`;
            
            // Dungeon info
            html += `
                <div class="dungeon-info">
                    <p><strong>Size:</strong> ${dungeon.general_info.size}</p>
                    <p><strong>Walls:</strong> ${dungeon.general_info.walls || 'N/A'}</p>
                    <p><strong>Floor:</strong> ${dungeon.general_info.floor || 'N/A'}</p>
                    <p><strong>Temperature:</strong> ${dungeon.general_info.temperature || 'N/A'}</p>
                    <p><strong>Illumination:</strong> ${dungeon.general_info.illumination || 'N/A'}</p>
                </div>
            `;

            // Room heading
            html += `<h1>${room.title}</h1>`;

            // Categorize entries by type
            const entriesByType = {};
            room.entries.forEach(entry => {
                if (!entriesByType[entry.entry_type]) {
                    entriesByType[entry.entry_type] = [];
                }
                entriesByType[entry.entry_type].push(entry);
            });

            // Display entries grouped by type
            const typeOrder = ['door', 'monster', 'feature', 'trap', 'trick', 'other'];
            typeOrder.forEach(type => {
                if (entriesByType[type]) {
                    html += `<h2>${type.charAt(0).toUpperCase() + type.slice(1)}s</h2>`;
                    entriesByType[type].forEach(entry => {
                        // Reconstruct "N x" format for monsters from count field
                        let displayContent = entry.content;
                        if (entry.entry_type === 'monster' && entry.count) {
                            displayContent = `${entry.count} x ${entry.content}`;
                        }
                        
                        html += `
                            <div class="entry">
                                <span class="entry-type">${entry.entry_type}</span>
                                <span class="entry-title">${entry.title}</span>
                        `;
                        html += '</div>';
                        html += `<div class="entry-content">${displayContent}</div>`;
                        
                        // Display traps if present
                        if (entry.traps && entry.traps.length > 0) {
                            entry.traps.forEach(trap => {
                                html += `<div class="entry-content" style="color: #900; font-weight: bold;">Ⓣ ${trap}</div>`;
                            });
                        }
                        
                        // Display door connectivity info
                        if (entry.entry_type === 'door' && entry.leads_to) {
                            html += `<div class="entry-content" style="color: #c00; font-weight: bold;">→ Leads to Room #${entry.leads_to}</div>`;
                        }
                    });
                }
            });

            document.getElementById('content').innerHTML = html;
        }

        // Load when page is ready
        document.addEventListener('DOMContentLoaded', loadDungeonData);
    </script>
</body>
</html>
