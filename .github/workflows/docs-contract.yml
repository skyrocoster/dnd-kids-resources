name: Documentation Contract

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: documentation-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python scripts/check_docs.py --check
      - if: github.event_name == 'pull_request'
        run: python scripts/check_docs.py --check --base "${{ github.event.pull_request.base.sha }}"
